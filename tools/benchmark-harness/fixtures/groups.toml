# Fixture group assignments for the benchmark harness.
#
# Groups:
#   clean_small              < 10 KB, well-formed HTML
#   clean_medium             10–200 KB, well-formed HTML
#   clean_large              200 KB–2 MB, well-formed HTML
#   spec_rules               Optional close-tag / implied-tbody exercises
#   fallthrough_custom_elements  Fixtures containing custom elements (tag-with-hyphen)
#   fallthrough_bare_lt      Fixtures with unescaped bare < in text content
#   adversarial              Synthetic failure-mode fixtures

