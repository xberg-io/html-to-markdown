[package]
name = "html-to-markdown-py"
version = "3.5.0"
edition = "2024"
license = "MIT"
description = "High-performance HTML to Markdown converter"
readme = false
keywords = ["html", "markdown", "converter"]
categories = ["text-processing"]

# Deps below are emitted unconditionally by the alef Python scaffold for
# manifest stability across regens. h2m's Python binding has no trait
# bridges and no async/streaming today, so `async-trait`, `tokio`, and
# `pyo3-async-runtimes` are unused. Silence cargo-machete rather than
# flapping on every prek run.
[package.metadata.cargo-machete]
ignored = ["async-trait", "pyo3-async-runtimes", "tokio"]

[lib]
name = "_html_to_markdown"
crate-type = ["cdylib"]

[features]
extension-module = ["pyo3/extension-module", "pyo3/abi3-py310"]

[dependencies]
async-trait = "0.1"
html-to-markdown-rs = { path = "../html-to-markdown", features = [
    "full",
    "metadata",
    "visitor",
    "serde",
    "inline-images",
] }
pyo3 = { version = "0.28" }
pyo3-async-runtimes = { version = "0.28", features = ["tokio-runtime"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread"] }
