[package]
name = "html-to-markdown-ffi"
version = "3.5.0"
edition = "2021"
license = "MIT"
description = "High-performance HTML to Markdown converter"
readme = false
keywords = ["html", "markdown", "converter"]
categories = ["text-processing"]
repository = "https://github.com/kreuzberg-dev/html-to-markdown"

[package.metadata.cargo-machete]
# tokio is pulled in for its runtime/macros at link time but the generated
# FFI source never `use`s it directly — cargo-machete would otherwise flag it.
ignored = ["async-trait", "tokio"]

[lib]
crate-type = ["cdylib", "staticlib"]

[features]
default = []

[dependencies]
async-trait = "0.1"
html-to-markdown-rs = { path = "../html-to-markdown", features = [
    "full",
    "metadata",
    "visitor",
    "serde",
    "inline-images",
] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }

[build-dependencies]
cbindgen = "0.29"

[dev-dependencies]
tempfile = "3"
