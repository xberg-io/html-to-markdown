[package]
name = "html-to-markdown-php"
version = "3.5.0"
edition = "2024"
license = "MIT"
description = "High-performance HTML to Markdown converter"
readme = false
keywords = ["html", "markdown", "converter"]
categories = ["text-processing"]

# Deps below are emitted unconditionally by the alef PHP scaffold for
# manifest stability across regens. h2m's PHP binding has no trait bridges
# and no async/streaming today, so `async-trait` and `tokio` are unused —
# silence cargo-machete rather than letting them flap on every prek run.
[package.metadata.cargo-machete]
ignored = ["async-trait", "tokio"]

[lib]
crate-type = ["cdylib"]

[features]
extension-module = []

[dependencies]
async-trait = "0.1"
ext-php-rs = "0.15"
html-to-markdown-rs = { path = "../html-to-markdown", features = [
    "full",
    "metadata",
    "visitor",
    "serde",
    "inline-images",
] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
