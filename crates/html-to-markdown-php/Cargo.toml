[package]
name = "html-to-markdown-php"
version = "3.5.0"
edition = "2021"
license = "MIT"
description = "High-performance HTML to Markdown converter"
readme = false
keywords = ["html", "markdown", "converter"]
categories = ["text-processing"]

[package.metadata.cargo-machete]
ignored = ["async-trait", "tokio"]

[lib]
crate-type = ["cdylib"]

[features]
extension-module = []

[dependencies]
async-trait = "0.1"
ext-php-rs = "0.15"
html-to-markdown-rs = { path = "../html-to-markdown", features = [
  "full",
  "metadata",
  "visitor",
  "serde",
  "inline-images",
] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
