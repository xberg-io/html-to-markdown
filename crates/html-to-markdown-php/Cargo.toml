[package]
name = "html-to-markdown-php"
version = "3.2.6"
edition = "2024"
license = "MIT"
description = "High-performance HTML to Markdown converter - PHP bindings"
repository = "https://github.com/kreuzberg-dev/html-to-markdown"
readme = false
keywords = ["html", "markdown", "converter"]
categories = ["text-processing", "web-programming"]

[lib]
crate-type = ["cdylib"]

[dependencies]
ext-php-rs = "0.15"
html-to-markdown-rs = { path = "../html-to-markdown", features = ["full", "metadata", "visitor", "serde", "inline-images"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
