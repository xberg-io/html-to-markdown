version: "3"

# ============================================================================
# html-to-markdown — Root Taskfile
# ============================================================================
# Primary development interface. Rust core tasks delegate to .task/languages/rust.yml.
# All binding language operations (setup, build, test, lint, format, clean, update)
# are handled by alef v0.7.0.
#
# Command patterns:
#   task setup         -> install all dependencies
#   task build         -> build core + bindings
#   task test          -> run all tests
#   task lint          -> run all linters via prek
#   task fmt           -> format all code
#   task rust:build    -> Rust-specific tasks
# ============================================================================

# Preconditions for task setup:
# - Rust toolchain (rustup) — install via https://rustup.rs
# - alef CLI — install via cargo install --git https://github.com/kreuzberg-dev/alef
# - prek — install via cargo install prek
# - Per-language tools auto-skipped via alef preconditions; install as needed:
#   - Python: uv, Node: pnpm (corepack enable), Ruby: bundle, PHP: composer
#   - Go: go, Java: mvn, C#: dotnet, Elixir: mix, R: Rscript

includes:
  rust:
    taskfile: ./.task/languages/rust.yml
  python:
    taskfile: ./.task/languages/python.yml
  node:
    taskfile: ./.task/languages/node.yml
  ruby:
    taskfile: ./.task/languages/ruby.yml
  php:
    taskfile: ./.task/languages/php.yml
  go:
    taskfile: ./.task/languages/go.yml
  java:
    taskfile: ./.task/languages/java.yml
  csharp:
    taskfile: ./.task/languages/csharp.yml
  elixir:
    taskfile: ./.task/languages/elixir.yml
  dart:
    taskfile: ./.task/languages/dart.yml
  swift:
    taskfile: ./.task/languages/swift.yml
  kotlin_android:
    taskfile: ./.task/languages/kotlin_android.yml
  version:
    taskfile: ./.task/tools/version-sync.yml
  docs:
    taskfile: ./.task/tools/docs.yml
  generate:
    taskfile: ./.task/tools/generate.yml
  _tools:
    taskfile: ./.task/tools/general.yml
    flatten: true

tasks:
  # === Setup ===
  setup:
    desc: "Install all dependencies and dev tools"
    cmds:
      - task: rust:install
      - alef setup
      - prek install
      - prek install --hook-type commit-msg

  # === Build ===
  build:
    desc: "Build core Rust library and all language bindings"
    cmds:
      - task: rust:build
      - alef build

  build:dev:
    desc: "Build all in debug mode"
    cmds:
      - task: rust:build:dev

  build:release:
    desc: "Build all in release mode"
    cmds:
      - task: rust:build:release

  build:ci:
    desc: "Build all in CI mode"
    cmds:
      - task: rust:build:ci

  build:core:
    desc: "Build Rust core library only"
    cmds:
      - task: rust:build

  build:bindings:
    desc: "Build all language bindings (skip Rust core)"
    cmds:
      - alef build

  build:cli:
    desc: "Build the html-to-markdown CLI binary"
    cmds:
      - task: rust:build:release

  # === Test ===
  test:
    desc: "Run all test suites across all languages"
    cmds:
      - task: rust:test
      - alef test

  test:bindings:
    desc: "Run binding test suites only (skip Rust core)"
    cmds:
      - alef test

  test:ci:
    desc: "Run all tests with coverage (CI mode)"
    cmds:
      - task: rust:test:ci
      - alef test --coverage

  # === Lint & Format ===
  lint:
    desc: "Lint all code via prek (pre-commit framework)"
    cmds:
      - prek run --all-files

  lint:check:
    desc: "Lint all code WITHOUT auto-fix (check-only)"
    cmds:
      - task: rust:lint:check

  go:lint:
    desc: "Lint Go bindings with golangci-lint"
    cmds:
      - golangci-lint run ./... --config .golangci.yml
    dir: packages/go

  ruby:format:
    desc: "Format Ruby bindings with rubocop"
    cmds:
      - alef fmt --lang ruby

  ruby:lint:
    desc: "Lint Ruby bindings with rubocop and steep"
    cmds:
      - alef lint --lang ruby

  php:format:
    desc: "Format PHP bindings with php-cs-fixer"
    cmds:
      - alef fmt --lang php

  php:lint:
    desc: "Lint PHP bindings with phpstan and php-cs-fixer"
    cmds:
      - alef lint --lang php

  csharp:format:
    desc: "Format C# bindings with dotnet format"
    cmds:
      - alef fmt --lang csharp

  csharp:lint:
    desc: "Lint C# bindings with dotnet format"
    cmds:
      - alef lint --lang csharp

  fmt:
    desc: "Format all code"
    cmds:
      - alef fmt

  format:
    desc: "Format all code (alias for fmt)"
    cmds:
      - task: fmt

  format:check:
    desc: "Check code formatting without modifications"
    cmds:
      - task: rust:format:check

  check:
    desc: "Run all checks (format + lint, no modifications)"
    cmds:
      - task: format:check
      - task: lint:check

  # === Update / Upgrade ===
  update:
    desc: "Update all dependencies (within major versions)"
    cmds:
      - alef update
      - cmd: gau --update .
        ignore_error: false
      - task: rust:update
      - task: python:update
      - task: node:update
      - task: ruby:update
      - task: php:update
      - task: go:update
      - task: java:update
      - task: csharp:update
      - task: elixir:update
      - task: dart:update
      - task: swift:update
      - task: kotlin_android:update
      - prek autoupdate

  upgrade:
    desc: "Upgrade all dependencies to latest (including breaking changes)"
    cmds:
      - alef update --latest
      - cmd: gau --update .
        ignore_error: false
      - task: rust:upgrade
      - task: python:upgrade
      - task: node:upgrade
      - task: ruby:upgrade
      - task: php:upgrade
      - task: go:upgrade
      - task: java:upgrade
      - task: csharp:upgrade
      - task: elixir:upgrade
      - task: dart:upgrade
      - task: swift:upgrade
      - task: kotlin_android:upgrade
      - prek autoupdate

  # === Coverage ===
  cov:rust:
    desc: "Generate Rust coverage report"
    cmds:
      - task: rust:coverage

  cov:all:
    desc: "Generate coverage for all languages"
    cmds:
      - task: rust:test:ci
      - alef test --coverage

  # === Version ===
  versions:sync:
    desc: "Synchronize version from Cargo.toml to all package manifests"
    cmds:
      - task: version:sync

  # === Publish ===
  publish:validate:
    desc: "Validate publish manifests are consistent"
    cmds:
      - alef publish validate

  publish:prepare:
    desc: "Prepare packages for publishing (vendor deps, stage FFI)"
    cmds:
      - alef publish prepare

  publish:build:
    desc: "Build release artifacts for all languages"
    cmds:
      - alef publish build

  publish:package:
    desc: "Package built artifacts into distributable archives"
    cmds:
      - alef publish package -o dist/

  # === Alef lifecycle ===
  alef:generate:
    desc: "Run full alef pipeline (generate + stubs + scaffold + readme + sync + e2e) and `alef docs` (docs/reference for Zensical)"
    cmds:
      - alef generate
      - alef stubs
      - alef scaffold
      - alef readme
      - alef sync-versions
      - alef e2e generate
      - alef e2e generate --registry
      - alef docs

  alef:verify:
    desc: "Check bindings are up-to-date (CI mode)"
    cmds:
      - alef verify --exit-code

  alef:sync:
    desc: "Sync version from Cargo.toml to all manifests"
    cmds:
      - alef sync-versions

  # === E2E tests (local fixture-based, via alef) ===
  # Per-language: <lang>:e2e — builds binding then runs e2e/<lang> suite
  # python:e2e is in .task/languages/python.yml (python: namespace)
  # rust:e2e is in .task/languages/rust.yml (rust: namespace)
  node:e2e:
    desc: "Build Node binding and run e2e/node fixture tests"
    cmds:
      - alef test --e2e --lang node

  ruby:e2e:
    desc: "Build Ruby binding and run e2e/ruby fixture tests"
    cmds:
      - alef test --e2e --lang ruby

  php:e2e:
    desc: "Build PHP extension and run e2e/php fixture tests"
    cmds:
      - alef test --e2e --lang php

  go:e2e:
    desc: "Build FFI and run e2e/go fixture tests"
    cmds:
      - alef test --e2e --lang go

  java:e2e:
    desc: "Build FFI and run e2e/java fixture tests"
    cmds:
      - alef test --e2e --lang java

  csharp:e2e:
    desc: "Build FFI and run e2e/csharp fixture tests"
    cmds:
      - alef test --e2e --lang csharp

  elixir:e2e:
    desc: "Build Elixir NIF and run e2e/elixir fixture tests"
    cmds:
      - alef test --e2e --lang elixir

  wasm:e2e:
    desc: "Build WASM and run e2e/wasm fixture tests"
    cmds:
      - alef test --e2e --lang wasm

  r:e2e:
    desc: "Run e2e/r fixture tests"
    cmds:
      - alef test --e2e --lang r

  c:e2e:
    desc: "Build FFI and run e2e/c fixture tests"
    cmds:
      - alef test --e2e --lang c

  e2e:all:
    desc: "Build all bindings and run all local e2e fixture tests"
    cmds:
      - alef test --e2e

  e2e:full:
    desc: "Regenerate e2e tests, build all bindings, and run all e2e tests"
    cmds:
      - alef e2e generate
      - alef generate --clean
      - alef test --e2e

  e2e:generate:
    desc: "Generate E2E tests for all languages from fixtures"
    cmds:
      - alef e2e generate

  e2e:test:
    desc: "Run E2E tests for all languages"
    cmds:
      - alef test --e2e

  e2e:smoke:all:
    desc: "Run smoke tests for all published packages (fast validation)"
    cmds:
      - task: e2e:smoke:python
      - task: e2e:smoke:node
      - task: e2e:smoke:bun
      - task: e2e:smoke:wasm
      - task: e2e:smoke:ruby
      - task: e2e:smoke:php
      - task: e2e:smoke:go
      - task: e2e:smoke:java
      - task: e2e:smoke:csharp
      - task: e2e:smoke:elixir
      - task: e2e:smoke:r
      - task: e2e:smoke:rust
      - task: e2e:smoke:c

  e2e:smoke:python:
    desc: "Smoke test Python package from PyPI"
    dir: test_apps/python
    cmds:
      - uv sync
      - uv run pytest tests/test_smoke.py -v

  e2e:smoke:node:
    desc: "Smoke test Node package from npm"
    dir: test_apps/node
    cmds:
      - pnpm install
      - pnpm exec vitest run tests/smoke.test.ts

  e2e:smoke:ruby:
    desc: "Smoke test Ruby gem from RubyGems"
    dir: test_apps/ruby
    cmds:
      - bundle install
      - bundle exec rspec spec/smoke_spec.rb

  e2e:smoke:php:
    desc: "Smoke test PHP package from Packagist"
    dir: test_apps/php
    cmds:
      - composer install
      - vendor/bin/phpunit tests/SmokeTest.php

  e2e:smoke:go:
    desc: "Smoke test Go package from pkg.go.dev"
    dir: test_apps/go
    cmds:
      - go mod download
      - go test -v -run Smoke

  e2e:smoke:java:
    desc: "Smoke test Java package from Maven Central"
    dir: test_apps/java
    cmds:
      - ./mvnw{{if eq .OS "windows"}}.cmd{{end}} clean install -DskipTests
      - ./mvnw{{if eq .OS "windows"}}.cmd{{end}} test -Dtest=SmokeTest

  e2e:smoke:csharp:
    desc: "Smoke test C# package from NuGet"
    dir: test_apps/csharp
    cmds:
      - dotnet restore
      - dotnet test --filter FullyQualifiedName~SmokeTest

  e2e:smoke:elixir:
    desc: "Smoke test Elixir package from Hex.pm"
    dir: test_apps/elixir
    cmds:
      - mix deps.get
      - mix test test/smoke_test.exs

  e2e:smoke:r:
    desc: "Smoke test R package"
    dir: test_apps/r
    cmds:
      - Rscript -e "library(testthat); library(htmltomarkdown); test_file('tests/test_smoke.R')"

  e2e:smoke:bun:
    desc: "Smoke test Node package from npm under Bun"
    dir: test_apps/bun
    cmds:
      - bun install
      - bun test smoke.test.ts

  e2e:smoke:wasm:
    desc: "Smoke test WASM package from npm"
    dir: test_apps/wasm
    cmds:
      - pnpm install
      - pnpm exec vitest run tests/smoke.test.ts

  e2e:smoke:rust:
    desc: "Smoke test Rust crate from crates.io"
    dir: test_apps/rust
    cmds:
      - cargo test --test smoke_test

  e2e:smoke:c:
    desc: "Smoke test C FFI from GitHub release tarballs"
    dir: test_apps/c
    cmds:
      - make test

  e2e:test:all:
    desc: "Run comprehensive tests for all published packages"
    cmds:
      - task: e2e:test:python
      - task: e2e:test:node
      - task: e2e:test:ruby
      - task: e2e:test:php
      - task: e2e:test:go
      - task: e2e:test:java
      - task: e2e:test:csharp
      - task: e2e:test:elixir
      - task: e2e:test:r
      - task: e2e:test:swift
      - task: e2e:test:dart
      - task: e2e:test:zig
      - task: e2e:test:kotlin_android

  e2e:test:python:
    desc: "Comprehensive tests for Python package"
    dir: test_apps/python
    cmds:
      - uv sync
      - uv run pytest comprehensive_test.py -v

  e2e:test:node:
    desc: "Comprehensive tests for Node package"
    dir: test_apps/node
    cmds:
      - pnpm install
      - pnpm test:comprehensive

  e2e:test:ruby:
    desc: "Comprehensive tests for Ruby gem"
    dir: test_apps/ruby
    cmds:
      - bundle install
      - bundle exec rspec comprehensive_test.rb

  e2e:test:php:
    desc: "Comprehensive tests for PHP package"
    dir: test_apps/php
    cmds:
      - composer install
      - vendor/bin/phpunit comprehensive_test.php

  e2e:test:go:
    desc: "Comprehensive tests for Go package"
    dir: test_apps/go
    cmds:
      - go mod download
      - go test -v -run Comprehensive

  e2e:test:java:
    desc: "Comprehensive tests for Java package"
    dir: test_apps/java
    cmds:
      - ./mvnw{{if eq .OS "windows"}}.cmd{{end}} test -Dtest=ComprehensiveTest

  e2e:test:csharp:
    desc: "Comprehensive tests for C# package"
    dir: test_apps/csharp
    cmds:
      - dotnet test --filter FullyQualifiedName~ComprehensiveTest

  e2e:test:elixir:
    desc: "Comprehensive tests for Elixir package"
    dir: test_apps/elixir
    cmds:
      - mix test test/comprehensive_test.exs

  e2e:test:r:
    desc: "Comprehensive tests for R package"
    dir: packages/r
    cmds:
      - Rscript -e 'devtools::test()'

  e2e:test:swift:
    desc: "Comprehensive tests for Swift package"
    dir: test_apps/swift_e2e
    cmds:
      - swift test

  e2e:test:dart:
    desc: "Comprehensive tests for Dart package"
    dir: test_apps/dart
    cmds:
      - dart pub get
      - dart test

  e2e:test:zig:
    desc: "Comprehensive tests for Zig package"
    dir: test_apps/zig
    cmds:
      - zig build test

  e2e:test:kotlin_android:
    desc: "Comprehensive tests for Kotlin/Android AAR (host JVM tests)"
    dir: test_apps/kotlin_android
    cmds:
      - ./gradlew test

  # === test_apps aggregators (mirrors lllm naming convention) ===
  test-apps:smoke:
    desc: "Run all test_app smoke tests (alias for e2e:smoke:all)"
    cmds:
      - task: e2e:smoke:all

  test-apps:comprehensive:
    desc: "Run all test_app comprehensive tests (alias for e2e:test:all)"
    cmds:
      - task: e2e:test:all

  # === Demo ===
  build:demo:
    desc: "Build the GitHub Pages demo"
    cmds:
      - ./scripts/build-demo.sh

  serve:demo:
    desc: "Serve the GitHub Pages demo locally on port 8000"
    dir: docs
    cmds:
      - python3 -m http.server 8000

  # === Clean ===
  clean:
    desc: "Remove build artifacts across all languages"
    cmds:
      - task: rust:clean
      - alef clean

  # === Default ===
  default:
    desc: "List available tasks"
    cmds:
      - task --list
