site_name: html-to-markdown
site_description: High-performance HTML to Markdown conversion powered by Rust
site_url: https://docs.html-to-markdown.kreuzberg.dev
site_author: kreuzberg.dev
repo_name: kreuzberg-dev/html-to-markdown
repo_url: https://github.com/kreuzberg-dev/html-to-markdown
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2023-2026 Kreuzberg.dev

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/logo.svg
  favicon: assets/favicon.ico
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: sun
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: moon
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - navigation.prune
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    - toc.integrate
    - announce.dismiss
  icon:
    repo: github
    search: search
  language: en

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      options:
        custom_icons:
          - docs/overrides/.icons
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      linenums: false
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      base_path: ["docs", "."]
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - toc:
      permalink: true
      toc_depth: 3

plugins:
  - search
  - social:
      cards: false
  - tags
  - minify:
      minify_html: true
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [packages/python]
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2
            show_category_heading: true
            show_if_no_docstring: false
            show_signature_annotations: true
            show_submodules: false
            docstring_style: google
            docstring_section_style: spacy
  - git-revision-date-localized:
      enable_creation_date: true
      enable_git_follow: false
      type: timeago
      fallback_to_build_date: true
      enabled: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kreuzberg-dev/html-to-markdown
      name: View on GitHub
    - icon: fontawesome/brands/discord
      link: https://discord.gg/pXxagNK2zN
      name: Community on Discord
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/html-to-markdown/
      name: View on PyPI
    - icon: fontawesome/brands/npm
      link: https://www.npmjs.com/package/@kreuzberg/html-to-markdown-node
      name: View on npm
    - icon: fontawesome/brands/rust
      link: https://crates.io/crates/html-to-markdown-rs
      name: View on crates.io
  status:
    new: Recently added
    deprecated: Deprecated
  repo:
    stars: true
    forks: true

extra_css:
  - css/extra.css

nav:
  - Home: index.md
  - Demo: https://docs.html-to-markdown.kreuzberg.dev/demo
  - Getting Started:
    - Installation: installation.md
    - Usage: usage.md
    - Configuration: configuration.md
    - CLI: cli.md
  - Reference:
    - API Reference: api-reference.md
    - Error Handling: errors.md
    - Table Extraction: tables.md
    - Visitor Pattern: visitor.md
  - Guides:
    - Architecture: architecture.md
    - Language Bindings: language-guides.md
    - Migration Guide: migration.md
  - Contributing:
    - Contributing: contributing.md
  - Changelog: https://github.com/kreuzberg-dev/html-to-markdown/blob/main/CHANGELOG.md
