default_install_hook_types:
  - pre-commit
  - commit-msg
exclude: ^docs/snippets/|vendor/|node_modules/|target/|dist/|artifacts/|scripts/ci/|\.cache/|rust-vendor/|\.venv/

repos:
  # AI-Rulez: auto-generate AI assistant configuration files
  - repo: https://github.com/Goldziher/ai-rulez
    rev: v4.0.8
    hooks:
      - id: ai-rulez-generate

  # Commit message linting
  - repo: https://github.com/Goldziher/gitfluff
    rev: v0.8.0
    hooks:
      - id: gitfluff-lint
        args: ["--write"]
        stages: [commit-msg]

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.github/copilot-instructions\.md
      - id: end-of-file-fixer
        exclude: \.github/copilot-instructions\.md
      - id: check-merge-conflict
      - id: check-added-large-files
        exclude: uv.lock
      - id: detect-private-key
      - id: check-json
        exclude: tsconfig\.base\.json
      - id: check-yaml
        args: ["--allow-multiple-documents", "--unsafe"]
      - id: check-toml
      - id: check-case-conflict

  # TOML formatting
  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: "v2.21.1"
    hooks:
      - id: pyproject-fmt

  - repo: https://github.com/DevinR528/cargo-sort
    rev: "v2.1.4"
    hooks:
      - id: cargo-sort
        args: [-w]

  # Python: ruff (linting + formatting) + mypy (type checking)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        exclude: "e2e/|tests/|scripts/"

  # Rust: formatting and linting (core workspace only — bindings handled by alef)
  - repo: https://github.com/AndrejOrsula/pre-commit-cargo
    rev: 0.5.0
    hooks:
      - id: cargo-fmt
        args: ["--all"]
      - id: cargo-clippy
        args:
          [
            "--fix",
            "--allow-dirty",
            "--allow-staged",
            "--workspace",
            "--exclude=html-to-markdown-php",
            "--exclude=html-to-markdown-py",
            "--exclude=html-to-markdown-node",
            "--exclude=html-to-markdown-e2e-rust",
            "--all-features",
            "--all-targets",
            "--",
            "-D",
            "warnings",
          ]

  - repo: https://github.com/bnjbvr/cargo-machete
    rev: v0.9.2
    hooks:
      - id: cargo-machete
        exclude: ^e2e/

  - repo: https://github.com/EmbarkStudios/cargo-deny
    rev: 0.19.4
    hooks:
      - id: cargo-deny
        args: ["check"]

  # Node/TS/WASM: oxlint
  - repo: https://github.com/oxc-project/mirrors-oxlint
    rev: v1.62.0
    hooks:
      - id: oxlint
        args: ["--fix"]
        exclude: ^(docs/demo/|e2e/)

  # C/FFI: formatting and linting
  - repo: https://github.com/pocc/pre-commit-hooks
    rev: v1.3.5
    hooks:
      - id: clang-format
        args: [--style=file]
        files: ^crates/html-to-markdown-ffi/tests/c/
      - id: cppcheck
        args:
          [
            "--std=c11",
            "--enable=warning,style,performance",
            "--suppress=missingIncludeSystem",
            "--suppress=unusedStructMember",
            "--suppress=normalCheckLevelMaxBranches",
          ]
        files: ^crates/html-to-markdown-ffi/tests/c/

  # Go: formatting and linting (runs per Go module via Taskfile)
  - repo: local
    hooks:
      - id: golangci-lint-full
        name: golangci-lint (all Go modules)
        entry: task go:lint
        language: system
        files: \.go$
        pass_filenames: false

  # Markdown linting
  - repo: https://github.com/rvben/rumdl-pre-commit
    rev: "v0.1.83"
    hooks:
      - id: rumdl-fmt
        exclude: 'test_documents/|\.ai-rulez/|\.remote-cache/|e2e/|fixtures/|test_apps/|\.github/copilot-instructions\.md|CLAUDE\.md|\.claude/|\.agents/|\.codex/'

  # Shell scripts: formatting and linting
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        args: ["-w", "-i", "2"]

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck

  # Alef: verify bindings and sync versions
  - repo: https://github.com/kreuzberg-dev/alef
    rev: v0.10.4
    hooks:
      - id: alef-verify
      - id: alef-sync-versions

  # GitHub Actions: linting
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # Java: copy-paste detection and style checking
  - repo: https://github.com/gherynos/pre-commit-java
    rev: v0.6.37
    hooks:
      - id: cpd
        exclude: ^(\.mvn/wrapper/|e2e/|test_apps/|packages/java/src/)
      - id: checkstyle
        args:
          [
            "-c",
            "packages/java/checkstyle.xml",
            "-p",
            "packages/java/checkstyle.properties",
          ]
        exclude: ^(\.mvn/wrapper/|e2e/|test_apps/|packages/java/src/)

  # Spelling (last — runs after all formatters and generators)
  - repo: https://github.com/crate-ci/typos
    rev: v1.45.2
    hooks:
      - id: typos
        args: [--force-exclude]

  # Local hooks for unsupported languages (Ruby, Java, C#, PHP, Elixir, R) and custom configurations
  - repo: local
    hooks:
      # Ruby
      - id: ruby-format
        name: Ruby formatting (rubocop)
        entry: task ruby:format
        language: system
        files: \.rb$
        pass_filenames: false
        require_serial: true

      - id: ruby-lint
        name: Ruby linting (rubocop + steep)
        entry: task ruby:lint
        language: system
        files: \.(rb|rbs)$
        pass_filenames: false
        require_serial: true

      # PHP
      - id: php-format
        name: PHP formatting (php-cs-fixer)
        entry: task php:format
        language: system
        files: \.php$
        pass_filenames: false
        require_serial: true

      - id: php-lint
        name: PHP linting (phpstan + php-cs-fixer)
        entry: task php:lint
        language: system
        files: \.php$
        pass_filenames: false
        require_serial: true

      # Java (maven verify — cpd/checkstyle handled by pre-commit-java above)
      - id: java-verify
        name: maven verify (java)
        entry: bash -lc 'if [ -f "$HOME/.sdkman/bin/sdkman-init.sh" ]; then source "$HOME/.sdkman/bin/sdkman-init.sh" && sdk env; fi; MAVEN_OPTS="${MAVEN_OPTS:-} --enable-native-access=ALL-UNNAMED -Dsun.misc.unsafe.memory.access=allow" mvn -f packages/java/pom.xml -B -DskipTests -Dgpg.skip=true -Dskip.rust.ffi=true verify'
        language: system
        files: ^packages/java/
        pass_filenames: false

      # C#
      - id: csharp-format
        name: C# formatting (dotnet format)
        entry: task csharp:format
        language: system
        files: \.cs$
        pass_filenames: false

      - id: csharp-lint
        name: C# linting (dotnet format)
        entry: task csharp:lint
        language: system
        files: \.cs$
        pass_filenames: false

      # Elixir
      - id: mix-format
        name: mix format
        entry: bash -c 'cd packages/elixir && MIX_ENV=dev mix format --check-formatted'
        language: system
        files: ^packages/elixir/
        pass_filenames: false

      - id: mix-credo
        name: mix credo
        entry: bash -c 'cd packages/elixir && MIX_ENV=dev mix credo --strict'
        language: system
        files: ^packages/elixir/
        pass_filenames: false

      # R (manual only — Rscript not available in all CI environments)
      - id: r-styler
        name: R formatting (styler)
        entry: bash -c 'cd packages/r && Rscript -e "styler::style_dir(\".\")"'
        language: system
        files: ^packages/r/
        pass_filenames: false
        stages: [manual]

      - id: r-lintr
        name: R linting (lintr)
        entry: bash -c 'cd packages/r && Rscript -e "lintr::lint_dir(\".\")"'
        language: system
        files: ^packages/r/
        pass_filenames: false
        stages: [manual]
