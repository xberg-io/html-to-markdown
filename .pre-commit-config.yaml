default_install_hook_types:
    - pre-commit
    - commit-msg
exclude: ^docs/snippets/|vendor/|node_modules/|target/|dist/|artifacts/|scripts/ci/|\.cache/|rust-vendor/|\.venv/
repos:
    - repo: https://github.com/Goldziher/gitfluff
      rev: v0.8.0
      hooks:
          - id: gitfluff-lint
            args:
                - --write
            stages:
                - commit-msg
    - repo: https://github.com/xberg-io/pre-commit-hooks
      rev: v2.3.0
      hooks:
          # Alef verification
          - id: alef-verify

          # Cargo / Rust
          - id: cargo-clippy
            args:
                - --fix
                - --allow-dirty
                - --allow-staged
                - --workspace
                - --exclude=html-to-markdown-php
                - --exclude=html-to-markdown-py
                - --exclude=html-to-markdown-node
                - --exclude=html_to_markdown_rs-e2e-rust
                - --all-features
                - --all-targets
                - --
                - -D
                - warnings
          - id: cargo-sort
            args:
                - -w
            exclude: ^(e2e/rust/|test_apps/rust/|packages/dart/rust/|packages/r/src/rust/|packages/elixir/native/[^/]+/)Cargo\.toml$
          - id: cargo-machete
            args:
                - crates/
            exclude: ^(e2e/|test_apps/)
          - id: cargo-deny
            args: ["check"]
          - id: rustdoc-lint
            files: ^crates/html-to-markdown/src/.*\.rs$
            exclude: /tests/
            args:
                - -p
                - html-to-markdown-rs
          - id: rust-max-lines
            args: ["--max=1000"]
            # Alef-generated binding crates routinely exceed 1000 lines (FFI surface
            # area). The limit is meaningful for core code; exclude the generated
            # binding crate roots + every per-language bridge crate's lib.rs +
            # scanner/preprocessing where the size is inherent.
            exclude: ^(crates/html-to-markdown-(ffi|node|wasm|py|php|cli)/src/.*\.rs|packages/.*/(rust/)?(src|native/.*/src)/(lib|frb_generated)\.rs|crates/html-to-markdown/src/converter/(tier1/scanner|utility/preprocessing)\.rs|(e2e/rust|test_apps/rust)/tests/.*\.rs|crates/html-to-markdown/tests/visitor_integration_test\.rs)$

          # Linters and checks
          - id: ai-rulez-generate
          - id: ai-rulez-validate

          - id: check-merge-conflict
          - id: check-added-large-files
            exclude: "(?x)^(\n  uv\\.lock\n  |crates/html-to-markdown/tests/fixtures/regressions/.*\n)$\n"
          - id: detect-private-key
          - id: check-case-conflict
          - id: check-executables-have-shebangs
          - id: check-shebang-scripts-are-executable
            # `#![allow(...)]` Rust crate-level attributes start with `#!` and are
            # misdetected as shebangs by this hook.
            exclude: \.rs$
          - id: typos
            args: ["--force-exclude"]
          - id: check-json
            exclude: tsconfig\.base\.json
          - id: check-yaml
            args:
                - --allow-multiple-documents
                - --unsafe
          - id: check-toml

          - id: actionlint
          - id: gh-actions-updater

          - id: shellcheck
            exclude: ^(test_apps/kotlin_android|packages/kotlin-android)/gradlew$

          - id: markdownlint-rumdl-strict
            exclude: ^(docs/.*|\.ai-rulez/.*|\.task/.*|packages/.*/README\.md|crates/.*/README\.md|readme_templates/.*|README\.md|CHANGELOG\.md|CONTRIBUTING\.md|\.github/PULL_REQUEST_TEMPLATE\.md|test_documents/.*|test_apps/.*)$
          - id: textlint
            files: ^docs/.*\.md$
            exclude: ^docs/(reference/|api-|snippets/|migration/)
            args:
                - --fix
                - --config
                - .textlintrc.json

          - id: ruff
            # packages/ and test_apps/ are alef-generated and ship as alef emits
            # them. Under alef 0.25.58's output-sensitive verify, ruff reformatting
            # generated Python (e.g. line-wrapping packages/python/.../api.py) breaks
            # alef-docs-fresh. Match the generated-tree exclusion other tools use.
            exclude: ^(e2e/|test_apps/|packages/)
          - id: mypy
            exclude: e2e/|tests/|scripts/|^packages/r/
          - id: pydocstyle
            files: ^packages/python/.*\.py$
            exclude: ^packages/python/(tests/|.*_native\.py$)

          - id: oxlint
            exclude: ^(e2e/|test_apps/)
          - id: tsc-typecheck
          - id: tsdoc-lint
          - id: golangci-lint
            exclude: ^(e2e/|test_apps/)
            env:
                KREUZBERG_GO_MOD_DIRS: packages/go
          - id: govulncheck
            exclude: ^(e2e/|test_apps/)
            env:
                KREUZBERG_GO_MOD_DIRS: packages/go
          - id: godoc-lint
            files: ^packages/go/.*\.go$
            exclude: ^(e2e/|test_apps/)
            env:
                KREUZBERG_GO_MOD_DIRS: packages/go

          - id: checkstyle
            args:
                - -c
                - packages/java/checkstyle.xml
                - -p
                - packages/java/checkstyle.properties
            exclude: ^(\.mvn/wrapper/|e2e/|test_apps/|packages/java/src/)
          - id: pmd
            # Benchmark harness scripts are auxiliary tooling, not shipped code. The
            # Java subprocess runner deliberately catches Error/Throwable to emit a
            # clean failure record before exiting, which trips PMD's
            # AvoidCatchingGenericException — not a concern for a benchmark driver.
            # Generated e2e code and Maven infrastructure are not shipped code.
            exclude: ^(tools/benchmark-harness/scripts/|e2e/|test_apps/|\.mvn/)
          - id: cpd
            args:
                - --minimum-tokens=120
            exclude: ^(test_apps/|e2e/java/)
          - id: java-verify
            files: ^packages/java/
          - id: javadoc-lint
            files: ^packages/java/src/main/.*\.java$

          - id: detekt
            files: ^packages/kotlin-android/.*\.kts?$
            args:
                - --build-upon-default-config
          # NOTE: ktlint is intentionally NOT run on alef-generated kotlin-android.
          # ktfmt (--kotlinlang-style) is the canonical formatter (matches alef:format);
          # ktlint's always-format mode conflicts with ktfmt (blank-line-after-brace) and
          # mangles alef's `///` doc comments into `// /`. detekt covers static analysis.
          - id: kotlin-dokka

          - id: rubocop-lint
            files: ^packages/ruby/.*\.(rb|rbs)$
            exclude: ^packages/ruby/(ext/|lib/html_to_markdown/native\.rb$)
          - id: steep
            files: ^packages/ruby/.*\.(rb|rbs)$
            exclude: ^packages/ruby/(ext/|lib/html_to_markdown/native\.rb$)
          - id: yard-coverage
            # All Ruby under packages/ruby is alef-generated (native.rb holds
            # inherently undocumentable Sorbet-sig RBI defs). Generated code
            # ships as alef emits it; match the generated-tree exclusion every
            # other doc/lint/format hook already uses.
            exclude: ^(packages/ruby/|e2e/|test_apps/)

          - id: dotnet-format-check
            files: ^packages/csharp/.*\.cs$
          - id: cs-xmldoc-lint
            files: ^packages/csharp/HtmlToMarkdown/.*\.cs$

          - id: phpstan
            files: ^packages/php/src/.*\.php$
            exclude: ^packages/php/stubs/
            # Pin the canonical config (see alef.toml php `check`). The shared
            # hook runs phpstan from the repo root, where config auto-discovery
            # misses packages/php/phpstan.neon and its `scanFiles` extension
            # stub, leaving every stub-defined type unknown.
            args: ["analyse", "--no-progress", "--configuration=packages/php/phpstan.neon"]
          - id: phpdoc-lint
            files: ^packages/php/src/.*\.php$

          - id: mix-credo
            files: ^packages/elixir/
            exclude: ^packages/elixir/lib/html_to_markdown/.*\.ex$
          - id: ex-doc-coverage

          - id: air-check
            files: ^packages/r/.*\.[Rr]$
            # packages/r is alef-generated (extendr) and formatted by alef's R
            # toolchain (styler), not air; it ships as emitted. All repo R lives
            # under generated trees, so air has nothing to check here.
            exclude: ^(e2e/|test_apps/|packages/)
          - id: lintr
            files: ^packages/r/.*\.[Rr]$
            exclude: ^(e2e/|test_apps/)
          - id: roxygen2-check
            files: ^packages/r/R/.*\.R$
          - id: swiftlint
            files: ^packages/swift/.*\.swift$
          - id: swift-doc-coverage
          - id: dart-analyze
            files: ^packages/dart/.*\.dart$
            exclude: ^(test_apps/|e2e/dart/)
          - id: dart-doc-lint
            files: ^packages/dart/lib/.*\.dart$
            exclude: ^packages/dart/lib/src/rust/

          - id: zig-build-check
            files: ^packages/zig/.*\.zig$
          - id: zig-doc-lint
            files: ^packages/zig/src/.*\.zig$
            exclude: ^packages/zig/src/html_to_markdown_rs\.zig$

          - id: clang-tidy
            files: ^crates/html-to-markdown-ffi/tests/c/
          - id: cppcheck
            args:
                - --suppress=unusedStructMember

          - id: alef-docs-fresh
          - id: alef-snippets-validate

          # Formatters
          - id: trailing-whitespace
            exclude: "(?x)^(\n  \\.github/copilot-instructions\\.md\n  |tools/benchmark-harness/snapshots/.*\\.snap\n)$\n"
          - id: end-of-file-fixer
            exclude:
                "(?x)^(\n  \\.github/copilot-instructions\\.md|\n  .*/\\.gitkeep|\n  .*/py\\.typed|\n  packages/java/checkstyle\\\
                .properties|\n  (e2e/python|e2e/python/tests|test_apps/python/tests)/__init__\\.py|\n  .*frb_generated\\.dart\n)$\n"
          - id: mixed-line-ending
          - id: shfmt
            args: ["-w", "-i", "2"]
            # Generated shell scripts (download_ffi.sh, install.sh, gradlew) ship
            # as alef emits them; shfmt rewriting them breaks alef verify under
            # 0.25.58. Hand-written scripts live outside these generated trees.
            exclude: ^(e2e/|test_apps/|packages/)
          - id: rumdl-fmt
          - id: cargo-fmt
            args: ["--all"]
          - id: pyproject-fmt
            # alef runs no pyproject-fmt pass, so generated pyproject.toml (e2e/,
            # test_apps/, packages/) ship as alef emits them; the hook's pinned
            # pyproject-fmt reorders them and breaks alef verify under 0.25.58.
            exclude: ^(e2e/|test_apps/|packages/)
          - id: ruff-format
            exclude: ^(e2e/|test_apps/|packages/)
          - id: oxfmt
            # alef has no e2e/test_apps JS/TS formatter (see alef.toml
            # [crates.e2e.format] — go/python/rust/c only), so oxfmt was the lone
            # tool reformatting generated test JS, producing churn on every regen.
            # Match the e2e/test_apps exclusion every other language tool already
            # uses (go-fmt, ruff-format, golangci-lint); generated test JS ships as
            # alef emits it, like e2e/ruby, e2e/php, etc.
            # packages/ is alef-generated, so skip it too. crates/html-to-markdown-{node,wasm}
            # contain generated binding code. .ai-rulez/ contains governance metadata.
            # composer.json (root + crates/html-to-markdown-php/) is alef-generated
            # and formatted by alef's npm oxfmt; the hook's oxc oxfmt binary uses a
            # different style (tabs vs spaces), so letting it touch them breaks alef
            # verify under 0.25.58.
            exclude: ^(\.ai-rulez/|e2e/|test_apps/|packages/|crates/html-to-markdown-(node|wasm|php)/|composer\.json$)

          - id: go-fmt
            exclude: ^(e2e/|test_apps/)
          - id: palantir-java-format
            # All Java is alef-generated (packages/java, kotlin-android stubs)
            # or generated test code (e2e/, test_apps/); .mvn is vendored Maven
            # wrapper infra. Generated code ships as alef emits it — match the
            # generated-tree exclusion used by every other formatter.
            exclude: ^(e2e/|test_apps/|packages/|\.mvn/)
          - id: ktfmt
            files: ^packages/kotlin-android/.*\.kts?$
            args:
                - --kotlinlang-style
          - id: rubocop
            files: ^packages/ruby/.*\.rb$
            exclude: ^packages/ruby/(ext/|lib/html_to_markdown/native\.rb$)
          - id: dotnet-format
            files: ^packages/csharp/.*\.cs$
          - id: php-cs-fixer
            files: ^packages/php/.*\.php$
            exclude: ^packages/php/stubs/
          - id: mix-format
            files: ^packages/elixir/
            exclude: ^packages/elixir/lib/html_to_markdown/.*\.ex$
          - id: air-format
            files: ^packages/r/.*\.[Rr]$
            # packages/r is alef-generated (extendr) and formatted by alef's R
            # toolchain (styler), not air; it ships as emitted. All repo R lives
            # under generated trees, so air has nothing to format here.
            exclude: ^(e2e/|test_apps/|packages/)
          - id: swift-format
            files: ^packages/swift/.*\.swift$
          - id: dart-format
            files: ^packages/dart/.*\.dart$
          - id: zig-fmt
            files: ^packages/zig/.*\.zig$
          - id: clang-format
            args:
                - --style=file
            files: ^crates/html-to-markdown-ffi/tests/c/
