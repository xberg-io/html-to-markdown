default_install_hook_types:
  - pre-commit
  - commit-msg
exclude: ^docs/snippets/|vendor/|node_modules/|target/|dist/|artifacts/|scripts/ci/|\.cache/|rust-vendor/|\.venv/

repos:
  # AI-Rulez: auto-generate AI assistant configuration files
  - repo: https://github.com/Goldziher/ai-rulez
    rev: v4.1.6
    hooks:
      - id: ai-rulez-generate

  # Commit message linting
  - repo: https://github.com/Goldziher/gitfluff
    rev: v0.8.0
    hooks:
      - id: gitfluff-lint
        args: ["--write"]
        stages: [commit-msg]

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.github/copilot-instructions\.md
      - id: end-of-file-fixer
        exclude: \.github/copilot-instructions\.md
      - id: check-merge-conflict
      - id: check-added-large-files
        exclude: uv.lock
      - id: detect-private-key
      - id: check-json
        exclude: tsconfig\.base\.json
      - id: check-yaml
        args: ["--allow-multiple-documents", "--unsafe"]
      - id: check-toml
      - id: check-case-conflict

  # TOML formatting
  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: "v2.21.2"
    hooks:
      - id: pyproject-fmt

  # Python: ruff (linting + formatting) + mypy (type checking)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Node/TS/WASM: oxlint
  - repo: https://github.com/kreuzberg-dev/pre-commit-hooks
    rev: v1.0.0
    hooks:
      - id: cargo-sort
        args: [-w]
      - id: cargo-fmt
        args: ["--all"]
      - id: cargo-check
        args:
          [
            "--workspace",
            "--exclude=html-to-markdown-php",
            "--exclude=html-to-markdown-py",
            "--exclude=html-to-markdown-node",
            "--exclude=html-to-markdown-e2e-rust",
            "--all-features",
            "--all-targets",
          ]
      - id: cargo-clippy
        args:
          [
            "--fix",
            "--allow-dirty",
            "--allow-staged",
            "--workspace",
            "--exclude=html-to-markdown-php",
            "--exclude=html-to-markdown-py",
            "--exclude=html-to-markdown-node",
            "--exclude=html-to-markdown-e2e-rust",
            "--all-features",
            "--all-targets",
            "--",
            "-D",
            "warnings",
          ]
      - id: cargo-machete
        args: [crates/]
        exclude: ^(e2e/|test_apps/)
      - id: cargo-deny
        args: ["check"]
      - id: shfmt
        args: ["-w", "-i", "2"]
      - id: shellcheck
      - id: clang-format
        args: ["--style=file"]
        files: ^crates/html-to-markdown-ffi/tests/c/
      - id: clang-tidy
        files: ^crates/html-to-markdown-ffi/tests/c/
      - id: checkstyle
        args: ["-c", "packages/java/checkstyle.xml", "-p", "packages/java/checkstyle.properties"]
        exclude: ^(\.mvn/wrapper/|e2e/|test_apps/|packages/java/src/)
      - id: mypy
        exclude: "e2e/|tests/|scripts/|^packages/r/"
      - id: go-fmt
        exclude: ^(e2e/|test_apps/)
      - id: golangci-lint
        exclude: ^(e2e/|test_apps/)
        env:
          KREUZBERG_GO_MOD_DIRS: "packages/go"
      - id: govulncheck
        exclude: ^(e2e/|test_apps/)
      - id: rubocop
        files: ^packages/ruby/.*\.rb$
        exclude: ^packages/ruby/ext/
      - id: rubocop-lint
        files: ^packages/ruby/.*\.(rb|rbs)$
        exclude: ^packages/ruby/ext/
      - id: steep
        files: ^packages/ruby/.*\.(rb|rbs)$
        exclude: ^packages/ruby/ext/
      - id: dotnet-format
        files: ^packages/csharp/.*\.cs$
      - id: dotnet-format-check
        files: ^packages/csharp/.*\.cs$
      - id: php-cs-fixer
        files: ^packages/php/.*\.php$
      - id: phpstan
        files: ^packages/php/(src|tests)/.*\.php$
        args: ["analyse", "--no-progress", "--configuration", "packages/php/phpstan.neon"]
      - id: mix-format
        files: ^packages/elixir/
      - id: mix-credo
        files: ^packages/elixir/
      - id: java-verify
        files: ^packages/java/
      - id: textlint
        files: ^docs/.*\.md$
        exclude: ^docs/(reference/|api-|snippets/|migration/)
        args: ["--fix", "--config", ".textlintrc.json"]

      - id: oxlint
      - id: oxfmt
      - id: cppcheck
        args: ["--suppress=unusedStructMember"]
      - id: rumdl-fmt
      - id: cpd
        args: ["--minimum-tokens=120"]
        exclude: ^test_apps/
  # Alef: verify bindings and sync versions
  - repo: https://github.com/kreuzberg-dev/alef
    rev: v0.14.28
    hooks:
      - id: alef-verify
      - id: alef-sync-versions

  # GitHub Actions: linting
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # Java cpd — kept upstream (not yet in shared repo)
  - repo: https://github.com/crate-ci/typos
    rev: v1.46.0
    hooks:
      - id: typos
        args: [--force-exclude]
