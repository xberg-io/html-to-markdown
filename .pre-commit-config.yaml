default_install_hook_types:
  - pre-commit
  - commit-msg
exclude: ^docs/snippets/|vendor/|node_modules/|target/|dist/|artifacts/|scripts/ci/|\.cache/|rust-vendor/|\.venv/

repos:
  # Commit message linting
  - repo: https://github.com/Goldziher/gitfluff
    rev: v0.8.0
    hooks:
      - id: gitfluff-lint
        args: ["--write"]
        stages: [commit-msg]

  # AI-Rulez: auto-generate AI assistant configuration files
  - repo: https://github.com/Goldziher/ai-rulez
    rev: v3.11.3
    hooks:
      - id: ai-rulez-generate

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        exclude: uv.lock
      - id: detect-private-key
      - id: check-json
        exclude: tsconfig\.base\.json
      - id: check-yaml
        args: ["--allow-multiple-documents", "--unsafe"]
      - id: check-toml
      - id: check-case-conflict

  # TOML formatting
  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: "v2.21.1"
    hooks:
      - id: pyproject-fmt

  - repo: https://github.com/DevinR528/cargo-sort
    rev: "v2.1.3"
    hooks:
      - id: cargo-sort
        args: [-w]

  - repo: https://github.com/ComPWA/taplo-pre-commit
    rev: v0.9.3
    hooks:
      - id: taplo-format
        exclude: "pyproject.toml|Cargo.toml"

  # Python: ruff (linting + formatting) + mypy (type checking)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.1
    hooks:
      - id: mypy
        exclude: "e2e/|scripts/|crates/|tests/test_apps/"

  # Rust: formatting, linting, and license checking
  - repo: https://github.com/AndrejOrsula/pre-commit-cargo
    rev: 0.5.0
    hooks:
      - id: cargo-fmt
        args: ["--all"]
      - id: cargo-clippy
        args:
          [
            "--fix",
            "--allow-dirty",
            "--allow-staged",
            "--workspace",
            "--exclude=html-to-markdown-php",
            "--exclude=html-to-markdown-py",
            "--exclude=html-to-markdown-node",
            "--exclude=html-to-markdown-wasm",
            "--exclude=html-to-markdown-e2e-rust",
            "--all-features",
            "--all-targets",
            "--",
            "-D",
            "warnings",
          ]

  - repo: https://github.com/bnjbvr/cargo-machete
    rev: v0.9.1
    hooks:
      - id: cargo-machete
        exclude: ^e2e/

  - repo: https://github.com/EmbarkStudios/cargo-deny
    rev: 0.19.2
    hooks:
      - id: cargo-deny
        args: ["check"]

  # JavaScript/TypeScript/JSON: biome (formatting + linting)
  - repo: https://github.com/biomejs/pre-commit
    rev: v2.4.11
    hooks:
      - id: biome-format
      - id: biome-lint

  - repo: https://github.com/oxc-project/mirrors-oxlint
    rev: v1.60.0
    hooks:
      - id: oxlint
        args: ["--fix"]
        exclude: ^docs/html_to_markdown_wasm\.js$|^e2e/

  # C/C++: formatting and linting
  - repo: https://github.com/pocc/pre-commit-hooks
    rev: v1.3.5
    hooks:
      - id: clang-format
        args: [--style=file]
        files: ^crates/html-to-markdown-ffi/tests/c/
      - id: cppcheck
        args:
          [
            "--std=c11",
            "--enable=warning,style,performance",
            "--suppress=missingIncludeSystem",
            "--suppress=unusedStructMember",
          ]
        files: ^crates/html-to-markdown-ffi/tests/c/

  - repo: https://github.com/checkmake/checkmake
    rev: v0.3.2
    hooks:
      - id: checkmake
        exclude: "Makefile\\.frag"

  # Shell scripts: formatting and linting
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        args: ["-w", "-i", "2"]

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck

  # GitHub Actions: linting
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # Java: copy-paste detection and style checking
  - repo: https://github.com/gherynos/pre-commit-java
    rev: v0.6.37
    hooks:
      - id: cpd
        exclude: ^\.mvn/wrapper/|^e2e/
      - id: checkstyle
        args:
          [
            "-c",
            "packages/java/checkstyle.xml",
            "-p",
            "packages/java/checkstyle.properties",
          ]
        exclude: ^\.mvn/wrapper/|^e2e/

  - repo: https://github.com/rvben/rumdl-pre-commit
    rev: "v0.1.71"
    hooks:
      - id: rumdl-fmt
        exclude: 'test_documents/|\.ai-rulez/|\.remote-cache/|e2e/|fixtures/'

  # Local hooks for language toolchains
  - repo: local
    hooks:
#       - id: golangci-lint-packages
#         name: golangci-lint (packages/go/v3)
#         entry: bash -c 'cd packages/go/v3 && golangci-lint run --config ../../../.golangci.yml ./...'
#         language: system
#         files: ^packages/go/
#         pass_filenames: false
#       - id: rubocop
#         name: rubocop
#         entry: task ruby:format
#         language: system
#         files: \.rb$
#         pass_filenames: false
#         require_serial: true
#         stages: [pre-commit]
      - id: rbs-validate
        name: rbs validate
        entry: task ruby:rbs-validate
        language: system
        files: \.(rb|rbs)$
        pass_filenames: false
        require_serial: true
        stages: [pre-commit]
      - id: steep-check
        name: steep check
        entry: task ruby:typecheck
        language: system
        files: \.(rb|rbs)$
        pass_filenames: false
        require_serial: true
        stages: [pre-commit]
      - id: php-lint
        name: php lint (cs-fixer + phpstan)
        entry: bash -c 'cd packages/php && composer install --no-interaction --no-progress && composer run lint:fix'
        language: system
        files: ^packages/php/
        pass_filenames: false
      - id: dotnet-format
        name: dotnet format
        entry: bash -c 'dotnet format packages/csharp/HtmlToMarkdown/HtmlToMarkdown.csproj && dotnet format packages/csharp/HtmlToMarkdown.Tests/HtmlToMarkdown.Tests.csproj'
        language: system
        files: ^packages/csharp/
        pass_filenames: false
      - id: mix-credo
        name: mix credo
        entry: bash -c 'cd packages/elixir && MIX_ENV=dev mix credo --strict'
        language: system
        files: ^packages/elixir/
        pass_filenames: false
      - id: mix-format
        name: mix format
        entry: bash -c 'cd packages/elixir && MIX_ENV=dev mix format --check-formatted'
        language: system
        files: ^packages/elixir/
        pass_filenames: false
      - id: java-verify
        name: maven verify (java)
        entry: bash -lc 'if [ -f "$HOME/.sdkman/bin/sdkman-init.sh" ]; then source "$HOME/.sdkman/bin/sdkman-init.sh" && sdk env; fi; MAVEN_OPTS="${MAVEN_OPTS:-} --enable-native-access=ALL-UNNAMED -Dsun.misc.unsafe.memory.access=allow" mvn -f packages/java/pom.xml -B -DskipTests -Dgpg.skip=true -Dskip.rust.ffi=true verify'
        language: system
        files: ^packages/java/
        pass_filenames: false
      - id: r-lintr
        name: lintr (R)
        entry: bash -c 'cd packages/r && Rscript -e "lints <- lintr::lint_package(); if (length(lints) > 0) { print(lints); quit(status=1) }"'
        language: system
        files: ^packages/r/
        pass_filenames: false
      - id: r-styler
        name: styler format check (R)
        entry: bash -c 'cd packages/r && Rscript -e "out <- styler::style_pkg(dry=\"on\"); if (!all(out\$changed == FALSE)) quit(status=1)"'
        language: system
        files: ^packages/r/
        pass_filenames: false
      - id: typescript-typecheck
        name: Check TypeScript types
        entry: task typescript:typecheck
        language: system
        files: \.(ts|tsx)$
        pass_filenames: false
        require_serial: true
        stages: [pre-commit]
