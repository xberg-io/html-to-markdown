# R extendr bindings tasks
# Compatible with macOS and Linux

version: "3"
internal: true

includes:
  platforms: ../config/platforms.yml
  _cfg: ../config/vars.yml

vars:
  R_PKG: "packages/r"

tasks:
  install:
    desc: "Install R dependencies"
    silent: false
    cmds:
      - cmd: Rscript -e 'for (pkg in c("devtools", "testthat", "rextendr", "lintr", "styler", "covr", "remotes")) { if (!requireNamespace(pkg, quietly = TRUE)) install.packages(pkg, repos = "https://cran.r-project.org") }'
        ignore_error: false

  build:
    desc: "Build R package with extendr (release)"
    silent: false
    cmds:
      - cmd: cd {{.R_PKG}} && bash ../../scripts/publish/r/stage-rust-core.sh && R CMD INSTALL .
        ignore_error: false

  build:dev:
    desc: "Build R package in dev mode"
    silent: false
    cmds:
      - task: build

  build:release:
    desc: "Build R package in release mode"
    silent: false
    cmds:
      - task: build

  build:ci:
    desc: "Build R package for CI"
    silent: false
    cmds:
      - task: build

  test:
    desc: "Run testthat tests for R bindings"
    silent: false
    cmds:
      - cmd: cd {{.R_PKG}} && Rscript -e 'devtools::test()'
        ignore_error: false

  test:ci:
    desc: "Run testthat tests with coverage for CI"
    silent: false
    cmds:
      - cmd: cd {{.R_PKG}} && Rscript -e 'devtools::test()'
        ignore_error: false

  lint:
    desc: "Lint R code WITH auto-fix (styler + lintr)"
    silent: false
    cmds:
      - cmd: cd {{.R_PKG}} && Rscript -e 'styler::style_pkg()'
        ignore_error: false
      - cmd: cd {{.R_PKG}} && Rscript -e 'lints <- lintr::lint_package(); if (length(lints) > 0) { print(lints); quit(status = 1) }'
        ignore_error: false

  lint:check:
    desc: "Lint R code WITHOUT auto-fix (check-only)"
    silent: false
    cmds:
      - cmd: cd {{.R_PKG}} && Rscript -e 'out <- styler::style_pkg(dry = "on"); if (!all(out$changed == FALSE)) quit(status = 1)'
        ignore_error: false
      - cmd: cd {{.R_PKG}} && Rscript -e 'lints <- lintr::lint_package(); if (length(lints) > 0) { print(lints); quit(status = 1) }'
        ignore_error: false

  format:
    desc: "Format R code with styler"
    silent: false
    cmds:
      - cmd: cd {{.R_PKG}} && Rscript -e 'styler::style_pkg()'
        ignore_error: false

  format:check:
    desc: "Check R code formatting without modifications"
    silent: false
    cmds:
      - cmd: cd {{.R_PKG}} && Rscript -e 'out <- styler::style_pkg(dry = "on"); if (!all(out$changed == FALSE)) quit(status = 1)'
        ignore_error: false

  update:
    desc: "Update R dependencies"
    silent: false
    cmds:
      - cmd: Rscript -e 'update.packages(repos = "https://cran.r-project.org", ask = FALSE)'
        ignore_error: true

  vendor:
    desc: "Vendor R package Rust dependencies (creates vendor.tar.xz)"
    silent: false
    cmds:
      - cmd: scripts/publish/r/vendor-dependencies.sh
        ignore_error: false

  package:
    desc: "Build CRAN source package (vendor + R CMD build)"
    silent: false
    cmds:
      - cmd: scripts/publish/r/build-cran-package.sh
        ignore_error: false

  check:
    desc: "Run R CMD check --as-cran on built package"
    silent: false
    cmds:
      - cmd: cd {{.R_PKG}} && R CMD check --as-cran --no-manual htmltomarkdown_*.tar.gz
        ignore_error: false

  e2e:generate:
    desc: "Generate E2E tests from fixtures using alef"
    silent: false
    cmds:
      - cmd: alef e2e generate --lang r
        ignore_error: false

  e2e:test:
    desc: "Run R E2E tests in e2e/r directory"
    silent: false
    deps:
      - build
    cmds:
      - cmd: cd e2e/r && Rscript run_tests.R
        ignore_error: false

  clean:
    desc: "Clean R build artifacts"
    silent: false
    cmds:
      - cmd: rm -rf {{.R_PKG}}/src/rust/target {{.R_PKG}}/src/rust/vendor {{.R_PKG}}/src/rust/vendor.tar.xz {{.R_PKG}}/src/*.o {{.R_PKG}}/src/*.so {{.R_PKG}}/src/*.dll {{.R_PKG}}/htmltomarkdown_*.tar.gz
        ignore_error: true
