# Cross-platform Node.js tasks using pnpm and NAPI-RS
# Compatible with Windows (PowerShell/cmd), macOS, and Linux

version: "3"
internal: true

includes:
  platforms: ../config/platforms.yml
  _cfg: ../config/vars.yml

vars:
  BUILD_PROFILE: "{{.BUILD_PROFILE | default \"release\"}}"
  NODE_PKG: "packages/typescript"
  NAPI_CRATE: "crates/html-to-markdown-node"

tasks:
  install:
    desc: "Install Node.js dependencies with pnpm"
    silent: false
    cmds:
      - cmd: cd {{.NODE_PKG}} && pnpm install
        ignore_error: false

  build:
    desc: "Build NAPI-RS bindings with {{.BUILD_PROFILE}} profile"
    silent: false
    cmds:
      - cmd: |
          cd {{.NAPI_CRATE}} && napi build --output-dir .{{if eq .BUILD_PROFILE "release"}} --release{{end}}
        ignore_error: false

  build:dev:
    desc: "Build NAPI-RS bindings in debug mode"
    silent: false
    cmds:
      - cmd: cd {{.NAPI_CRATE}} && napi build --output-dir .
        ignore_error: false

  build:release:
    desc: "Build NAPI-RS bindings in release mode"
    silent: false
    cmds:
      - cmd: cd {{.NAPI_CRATE}} && napi build --output-dir . --release
        ignore_error: false

  build:ci:
    desc: "Build NAPI-RS bindings for CI (release mode)"
    silent: false
    cmds:
      - cmd: cd {{.NAPI_CRATE}} && napi build --output-dir . --release
        ignore_error: false

  test:
    desc: "Run Node.js tests with pnpm"
    silent: false
    cmds:
      - cmd: cd {{.NODE_PKG}} && pnpm test
        ignore_error: false

  test:ci:
    desc: "Run Node.js tests with coverage for CI"
    silent: false
    cmds:
      - cmd: cd {{.NODE_PKG}} && pnpm test -- --coverage
        ignore_error: false

  lint:
    desc: "Lint Node.js code WITH auto-fix (biome check --apply)"
    silent: false
    cmds:
      - cmd: cd {{.NODE_PKG}} && pnpm lint --fix
        ignore_error: false

  lint:check:
    desc: "Lint Node.js code WITHOUT auto-fix (check-only)"
    silent: false
    cmds:
      - cmd: cd {{.NODE_PKG}} && pnpm lint
        ignore_error: false

  format:
    desc: "Format Node.js code with prettier/biome"
    silent: false
    cmds:
      - cmd: cd {{.NODE_PKG}} && pnpm format
        ignore_error: false

  format:check:
    desc: "Check Node.js formatting without modifications"
    silent: false
    cmds:
      - cmd: cd {{.NODE_PKG}} && pnpm format:check
        ignore_error: false

  update:
    desc: "Update Node.js dependencies with pnpm"
    cmds:
      - echo "Updating Node/TypeScript dependencies across workspace..."
      - corepack up
      - pnpm up --latest -r
      - pnpm up --latest -w

  e2e:generate:
    desc: "Generate E2E tests from fixtures using alef"
    silent: false
    cmds:
      - cmd: alef e2e generate --lang typescript
        ignore_error: false

  e2e:test:
    desc: "Run Node/TypeScript E2E tests in e2e/node directory"
    silent: false
    cmds:
      - cmd: cd e2e/node && pnpm install --ignore-workspace && pnpm test
        ignore_error: false

  clean:
    desc: "Clean Node.js build artifacts (cross-platform)"
    silent: false
    cmds:
      - cmd: cd {{.NODE_PKG}} && node -e "const fs=require('fs'); ['dist','node_modules','.pnpm-debug.log'].forEach(p=>fs.rmSync(p,{recursive:true,force:true}))"
        ignore_error: true
