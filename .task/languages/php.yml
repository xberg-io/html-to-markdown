# Cross-platform PHP ext-php-rs extension with Composer wrapper
# Compatible with Windows (PowerShell/cmd), macOS, and Linux

version: "3"
internal: true

includes:
  platforms: ../config/platforms.yml
  _cfg: ../config/vars.yml

vars:
  BUILD_PROFILE: "{{.BUILD_PROFILE | default \"release\"}}"
  PHP_PKG: "packages/php"

tasks:
  install:
    desc: "Install PHP dependencies with Composer"
    silent: false
    cmds:
      - cmd: composer install
        ignore_error: false

  build:
    desc: "Build PHP extension with Cargo ({{.BUILD_PROFILE}} profile)"
    silent: false
    cmds:
      - cmd: "{{.CARGO_BIN}} build{{if eq .BUILD_PROFILE \"release\"}} --release{{end}} -p html-to-markdown-php"
        ignore_error: false
      - cmd: php -m | grep html_to_markdown || echo "Extension not loaded (normal for development)"
        ignore_error: true

  build:dev:
    desc: "Build PHP extension in debug mode"
    silent: false
    cmds:
      - cmd: "{{.CARGO_BIN}} build -p html-to-markdown-php"
        ignore_error: false

  build:release:
    desc: "Build PHP extension in release mode"
    silent: false
    cmds:
      - cmd: "{{.CARGO_BIN}} build --release -p html-to-markdown-php"
        ignore_error: false

  build:ci:
    desc: "Build PHP extension for CI (release mode)"
    silent: false
    cmds:
      - cmd: "{{.CARGO_BIN}} build --release -p html-to-markdown-php"
        ignore_error: false

  test:
    desc: "Run PHPUnit tests for PHP binding"
    silent: false
    cmds:
      - cmd: vendor/bin/phpunit packages/php/tests/ --testdox
        ignore_error: false

  test:ci:
    desc: "Run PHPUnit tests with coverage for CI"
    silent: false
    cmds:
      - cmd: vendor/bin/phpunit packages/php/tests/ --coverage-clover=coverage.xml
        ignore_error: false

  lint:
    desc: "Lint PHP code WITH auto-fix (PHPStan + phpcbf)"
    silent: false
    cmds:
      - cmd: php -d detect_unicode=0 vendor/bin/phpstan --configuration=packages/php/phpstan.neon --memory-limit=512M
        ignore_error: false
      - cmd: PHP_CS_FIXER_IGNORE_ENV=1 php vendor/bin/php-cs-fixer fix --config packages/php/php-cs-fixer.php packages/php/src packages/php/tests
        ignore_error: false

  lint:check:
    desc: "Lint PHP code WITHOUT auto-fix (PHPStan + php-cs-fixer check)"
    silent: false
    cmds:
      - cmd: php -d detect_unicode=0 vendor/bin/phpstan --configuration=packages/php/phpstan.neon --memory-limit=512M
        ignore_error: false
      - cmd: PHP_CS_FIXER_IGNORE_ENV=1 php vendor/bin/php-cs-fixer fix --config packages/php/php-cs-fixer.php --dry-run packages/php/src packages/php/tests
        ignore_error: false

  format:
    desc: "Format PHP code with php-cs-fixer (auto-fix)"
    silent: false
    cmds:
      - cmd: PHP_CS_FIXER_IGNORE_ENV=1 php vendor/bin/php-cs-fixer fix --config packages/php/php-cs-fixer.php packages/php/src packages/php/tests
        ignore_error: false

  format:check:
    desc: "Check PHP code formatting without modifications"
    silent: false
    cmds:
      - cmd: PHP_CS_FIXER_IGNORE_ENV=1 php vendor/bin/php-cs-fixer fix --config packages/php/php-cs-fixer.php --dry-run packages/php/src packages/php/tests
        ignore_error: false

  update:
    desc: "Update PHP dependencies with Composer"
    silent: false
    cmds:
      - cmd: composer update
        ignore_error: false

  e2e:generate:
    desc: "Generate E2E tests from fixtures using alef"
    silent: false
    cmds:
      - cmd: alef e2e generate --lang php
        ignore_error: false

  e2e:test:
    desc: "Run PHP E2E tests in e2e/php directory"
    silent: false
    cmds:
      - cmd: cd e2e/php && composer install --no-progress --prefer-dist
        ignore_error: false
      - cmd: |
          if [ -n "${EXTENSION_PATH:-}" ]; then
            ini_file="$(mktemp)"
            echo "extension=${EXTENSION_PATH}" >"${ini_file}"
            export PHPRC="${ini_file}"
            php -r "echo 'extension loaded: ' . (function_exists('convert') ? 'yes' : 'no') . PHP_EOL;" || true
            cd e2e/php && php -d "extension=${EXTENSION_PATH}" vendor/bin/phpunit tests/
          else
            cd e2e/php && php vendor/bin/phpunit tests/
          fi
        ignore_error: false

  clean:
    desc: "Clean PHP build artifacts (cross-platform cleanup)"
    silent: false
    cmds:
      - cmd: |
          php -r "
          \$files = glob('packages/php/.php-cs-fixer.cache') ?: [];
          foreach (\$files as \$f) { if (is_file(\$f)) unlink(\$f); }
          \$dirs = ['vendor', 'packages/php/tmp'];
          foreach (\$dirs as \$d) {
            if (is_dir(\$d)) {
              \$cmd = PHP_OS_FAMILY === 'Windows' ? 'rmdir /s /q ' : 'rm -rf ';
              system(\$cmd . escapeshellarg(\$d));
            }
          }
          "
        ignore_error: true
