# Cross-platform WebAssembly tasks using wasm-pack
# Compatible with Windows (PowerShell/cmd), macOS, and Linux

version: "3"
internal: true

includes:
  platforms: ../config/platforms.yml
  _cfg: ../config/vars.yml

vars:
  WASM_PKG: "crates/html-to-markdown-wasm"
  WASM_TARGET: "wasm32-unknown-unknown"
  BUILD_PROFILE: "{{.BUILD_PROFILE | default \"release\"}}"
  RUST_LOG: "{{.RUST_LOG | default \"info\"}}"
  CARGO_TERM_COLOR: "always"

tasks:
  install:
    desc: "Install wasm-pack and wasm32 target"
    silent: false
    cmds:
      - cmd: cd {{.WASM_PKG}} && rustup target add {{.WASM_TARGET}}
        ignore_error: false
      - cmd: cd {{.WASM_PKG}} && cargo install wasm-pack --locked
        ignore_error: false

  build:
    desc: "Build WASM with wasm-pack ({{.BUILD_PROFILE}} profile)"
    silent: false
    cmds:
      - cmd: |
          cd {{.WASM_PKG}} && wasm-pack build{{if eq .BUILD_PROFILE "release"}} --release{{else}} --dev{{end}} --target bundler
        ignore_error: false

  build:dev:
    desc: "Build WASM in debug mode with wasm-pack"
    silent: false
    cmds:
      - cmd: cd {{.WASM_PKG}} && wasm-pack build --dev --target bundler
        ignore_error: false

  build:release:
    desc: "Build WASM in release mode with wasm-pack"
    silent: false
    cmds:
      - cmd: cd {{.WASM_PKG}} && wasm-pack build --release --target bundler
        ignore_error: false

  build:ci:
    desc: "Build WASM for CI (release optimized)"
    silent: false
    cmds:
      - cmd: cd {{.WASM_PKG}} && wasm-pack build --release --target bundler
        ignore_error: false

  test:
    desc: "Run WASM tests in Node.js environment"
    silent: false
    cmds:
      - cmd: cd {{.WASM_PKG}} && wasm-pack test --node
        ignore_error: false

  test:ci:
    desc: "Run WASM tests in CI with headless browsers"
    silent: false
    cmds:
      - cmd: cd {{.WASM_PKG}} && wasm-pack test --headless --firefox
        ignore_error: false

  test:node:
    desc: "Run WASM tests in Node.js environment"
    silent: false
    cmds:
      - cmd: cd {{.WASM_PKG}} && wasm-pack test --node
        ignore_error: false

  test:browser:
    desc: "Run WASM tests in headless browser (Chrome)"
    silent: false
    cmds:
      - cmd: cd {{.WASM_PKG}} && wasm-pack test --headless --chrome
        ignore_error: false

  lint:
    desc: "Lint WASM code WITH auto-fix (cargo fmt + cargo clippy --fix)"
    silent: false
    cmds:
      - cmd: cd {{.WASM_PKG}} && cargo fmt --all
        ignore_error: false
      - cmd: cd {{.WASM_PKG}} && rustup target add {{.WASM_TARGET}}
        ignore_error: false
      - cmd: cd {{.WASM_PKG}} && rustup run stable cargo clippy --target {{.WASM_TARGET}} --fix --allow-dirty --allow-staged -j {{.NUM_CPUS}}
        ignore_error: false

  lint:check:
    desc: "Lint WASM code WITHOUT auto-fix (check-only)"
    silent: false
    cmds:
      - cmd: cd {{.WASM_PKG}} && cargo fmt --all --check
        ignore_error: false
      - cmd: cd {{.WASM_PKG}} && rustup target add {{.WASM_TARGET}}
        ignore_error: false
      - cmd: cd {{.WASM_PKG}} && rustup run stable cargo clippy -j {{.NUM_CPUS}} --target {{.WASM_TARGET}} -- -D warnings
        ignore_error: false

  format:
    desc: "Format WASM code (with modifications)"
    silent: false
    cmds:
      - cmd: cd {{.WASM_PKG}} && cargo fmt --all
        ignore_error: false

  format:check:
    desc: "Check WASM formatting without modifications"
    silent: false
    cmds:
      - cmd: cd {{.WASM_PKG}} && cargo fmt --all --check
        ignore_error: false

  update:
    desc: "Update WASM dependencies"
    silent: false
    cmds:
      - cmd: cd {{.WASM_PKG}} && cargo update
        ignore_error: false

  clean:
    desc: "Clean WASM build artifacts"
    silent: false
    cmds:
      - cmd: cd {{.WASM_PKG}} && cargo clean
        ignore_error: false
      - cmd: cd {{.WASM_PKG}} && rm -rf pkg/
        ignore_error: true

  e2e:generate:
    desc: "Generate E2E tests from fixtures using alef"
    silent: false
    cmds:
      - cmd: alef e2e generate --lang wasm
        ignore_error: false

  e2e:test:
    desc: "Run WASM E2E tests in e2e/wasm directory (builds WASM first)"
    silent: false
    cmds:
      - cmd: cd {{.WASM_PKG}} && wasm-pack build --dev --target bundler
        ignore_error: false
      - cmd: cd e2e/wasm && pnpm install --ignore-workspace && pnpm test
        ignore_error: false

  pack:
    desc: "Build WASM package with bundler target for distribution"
    silent: false
    cmds:
      - cmd: cd {{.WASM_PKG}} && wasm-pack build --target bundler --release
        ignore_error: false
