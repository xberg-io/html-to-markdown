version: "3"
internal: true

tasks:
  update:
    desc: "Update Java dependencies within major versions (mvnw versions:use-next-versions)"
    silent: false
    cmds:
      - cmd: |
          cd packages/java && ./mvnw versions:use-next-versions -DgenerateBackupPoms=false
        ignore_error: false

  upgrade:
    desc: "Upgrade Java dependencies to latest including breaking changes (mvnw versions:use-latest-releases)"
    silent: false
    cmds:
      - cmd: |
          cd packages/java && ./mvnw versions:use-latest-releases -DgenerateBackupPoms=false
        ignore_error: false
