output_path = "packages/dart/README.md"
package_manager = ["pub"]
package_name = "h2m"
install_command = "dart pub add h2m"
description = """
High-performance HTML to Markdown converter for Dart via `flutter_rust_bridge`. Pure-Dart binding (no Flutter SDK required) suitable for server and CLI workloads; Flutter apps can also consume it via the standard pub.dev workflow.
Published as `h2m` on pub.dev because `html_to_markdown` and `html-to-markdown` are taken.
"""
migration_version = ""

[crates.readme.languages.dart.features]
visitor_pattern = true
metadata_extraction = true
cli_proxy = false

[crates.readme.languages.dart.performance]
platform = "Apple M4"
function = "convert()"
note = "Real Wikipedia documents"

[crates.readme.languages.dart.snippets]
basic_usage = "getting-started/basic_usage.md"
with_options = "getting-started/with_options.md"
metadata_extraction = "metadata/basic_extraction.md"

[crates.readme.languages.zig]
name = "Zig"
template = "language_package.md"
output_path = "packages/zig/README.md"
package_manager = ["zig"]
package_name = "html_to_markdown"
install_command = """
zig fetch --save https://github.com/kreuzberg-dev/html-to-markdown/releases/download/v3.5.0/zig.tar.gz"""
description = """
High-performance HTML to Markdown converter for Zig, consuming the existing C FFI surface (`libhtml_to_markdown_ffi`) via `linkSystemLibrary`. Idiomatic error sets, slice-based memory management, requires Zig 0.16+.
Distributed via GitHub Releases — pin a tag in `build.zig.zon` and `zig fetch` handles the rest.
"""
migration_version = ""

[crates.readme.languages.zig.features]
visitor_pattern = true
metadata_extraction = false
cli_proxy = false

[crates.readme.languages.zig.performance]
platform = "Apple M4"
function = "convert()"
note = "Real Wikipedia documents"

[crates.readme.languages.zig.snippets]
basic_usage = "getting-started/basic_usage.md"
with_options = "getting-started/with_options.md"

[crates.readme.languages.wasm]
name = "WebAssembly"
template = "language_package.md"
output_path = "crates/html-to-markdown-wasm/README.md"
package_manager = ["npm", "pnpm", "yarn", "bun"]
package_name = "@kreuzberg/html-to-markdown-wasm"
install_command = "pnpm add @kreuzberg/html-to-markdown-wasm"
description = """
Pure WebAssembly build of html-to-markdown for browsers, Deno, Cloudflare Workers, and other JS
runtimes without a Node.js native-addon ABI. Single `.wasm` artifact loaded via `wasm-bindgen`,
shipped with TypeScript types and dist targets for nodejs, web, bundler, and deno.
"""
migration_version = ""

[crates.readme.languages.wasm.features]
visitor_pattern = false
metadata_extraction = true
cli_proxy = false

[crates.readme.languages.wasm.performance]
platform = "Apple M4"
function = "convert()"
note = "Real Wikipedia documents"

[crates.readme.languages.wasm.snippets]
basic_usage = "getting-started/basic_usage.md"
with_options = "getting-started/with_options.md"

[crates.custom_modules]
node = ["helpers"]
r = ["options", "types"]

[[crates.trait_bridges]]
trait_name = "HtmlVisitor"
type_alias = "VisitorHandle"
param_name = "visitor"
bind_via = "options_field"
options_type = "ConversionOptions"
context_type = "NodeContext"
result_type = "VisitResult"
