[workspace]
alef_version = "0.14.6"
languages = ["python", "node", "ruby", "php", "ffi", "go", "java", "csharp", "elixir", "wasm", "r"]

[workspace.sync]
extra_paths = [
  "packages/ruby/lib/html_to_markdown/version.rb",
  "packages/python/html_to_markdown/__init__.py",
  "crates/html-to-markdown-node/package.json",
  "crates/html-to-markdown-node/npm/*/package.json",
]

# test_apps version sync — use text_replacements to avoid clobbering unrelated semver strings
[[workspace.sync.text_replacements]]
path = "test_apps/node/package.json"
search = '"@kreuzberg/html-to-markdown": "[^"]*"'
replace = '"@kreuzberg/html-to-markdown": "{version}"'

[[workspace.sync.text_replacements]]
path = "test_apps/bun/package.json"
search = '"@kreuzberg/html-to-markdown": "[^"]*"'
replace = '"@kreuzberg/html-to-markdown": "{version}"'

[[workspace.sync.text_replacements]]
path = "test_apps/wasm/package.json"
search = '"@kreuzberg/html-to-markdown-wasm": "[^"]*"'
replace = '"@kreuzberg/html-to-markdown-wasm": "{version}"'

[[workspace.sync.text_replacements]]
path = "test_apps/java/pom.xml"
search = "<version>{version}</version>"
replace = "<version>{version}</version>"

[[workspace.sync.text_replacements]]
path = "test_apps/csharp/TestApp.csproj"
search = 'Include="KreuzbergDev.HtmlToMarkdown" Version="[^"]*"'
replace = 'Include="KreuzbergDev.HtmlToMarkdown" Version="{version}"'

[[workspace.sync.text_replacements]]
path = "test_apps/php/composer.json"
search = '"kreuzberg-dev/html-to-markdown": "[^"]*"'
replace = '"kreuzberg-dev/html-to-markdown": ">={version}"'

[[crates]]
name = "html-to-markdown-rs"
core_import = "html_to_markdown_rs"
sources = [
  "crates/html-to-markdown/src/lib.rs",
  "crates/html-to-markdown/src/options/conversion.rs",
  "crates/html-to-markdown/src/options/preprocessing.rs",
  "crates/html-to-markdown/src/options/validation.rs",
  "crates/html-to-markdown/src/types/result.rs",
  "crates/html-to-markdown/src/types/document.rs",
  "crates/html-to-markdown/src/types/tables.rs",
  "crates/html-to-markdown/src/types/warnings.rs",
  "crates/html-to-markdown/src/error.rs",
  "crates/html-to-markdown/src/convert_api.rs",
  "crates/html-to-markdown/src/metadata/types.rs",
  "crates/html-to-markdown/src/visitor/traits.rs",
  "crates/html-to-markdown/src/visitor/types.rs",
]
version_from = "Cargo.toml"
workspace_root = "."
features = ["full", "metadata", "visitor", "serde", "inline-images"]

[crates.python]
module_name = "_html_to_markdown"
pip_name = "html-to-markdown"

[crates.python.stubs]
output = "packages/python/html_to_markdown/"

[crates.node]
package_name = "@kreuzberg/html-to-markdown-node"

[crates.ruby]
gem_name = "html-to-markdown"
exclude_types = ["ConversionOptionsBuilder", "VisitorHandle"]

[crates.ruby.stubs]
output = "packages/ruby/sig/"

[crates.php]
extension_name = "html_to_markdown"
namespace = "HtmlToMarkdown"

[crates.elixir]
app_name = "html_to_markdown"
exclude_types = ["VisitorHandle", "ConversionOptionsBuilder"]
cpu_bound_functions = ["convert"]

[crates.ffi]
prefix = "htm"
header_name = "html_to_markdown.h"
lib_name = "html_to_markdown_ffi"
visitor_callbacks = true

[crates.go]
module = "github.com/kreuzberg-dev/html-to-markdown/packages/go/v3"
package_name = "htmltomarkdown"

[crates.java]
package = "dev.kreuzberg.htmltomarkdown"

[crates.csharp]
namespace = "HtmlToMarkdown"

[crates.r]
package_name = "htmltomarkdown"

[crates.output]
python = "crates/html-to-markdown-py/src/"
node = "crates/html-to-markdown-node/src/"
ruby = "packages/ruby/ext/html_to_markdown_rb/src/"
php = "crates/html-to-markdown-php/src/"
ffi = "crates/html-to-markdown-ffi/src/"
go = "packages/go/"
java = "packages/java/src/main/java/"
elixir = "packages/elixir/native/html_to_markdown_nif/src/"
wasm = "crates/html-to-markdown-wasm/src/"
r = "packages/r/src/rust/src/"

[crates.exclude]
types = []
functions = []
methods = []

[crates.include]
types = ["ConversionOptions", "ConversionResult", "HtmlVisitor", "NodeContext", "VisitResult"]
functions = ["convert"]

[crates.lint.python]
precondition = "command -v ruff >/dev/null 2>&1"
before = "cd packages/python && uv sync"
typecheck = "cd packages/python && uv run mypy ."

[crates.lint.node]
precondition = "command -v npx >/dev/null 2>&1"
format = "npx oxfmt packages/typescript/src/"
check = "npx oxlint packages/typescript/"

[crates.lint.ruby]
precondition = "command -v bundle >/dev/null 2>&1"
before = "cd packages/ruby && bundle install"
format = "cd packages/ruby && bundle exec rubocop -a ."

[crates.lint.php]
precondition = "command -v php >/dev/null 2>&1"
before = "cd packages/php && composer install"
format = "cd packages/php && vendor/bin/php-cs-fixer fix ."
check = "cd packages/php && vendor/bin/phpstan --configuration=phpstan.neon --memory-limit=512M"

[crates.lint.go]
before = "cargo build --release -p html-to-markdown-ffi"

[crates.lint.elixir]
precondition = "command -v mix >/dev/null 2>&1"
before = "cd packages/elixir && mix deps.get"
check = "cd packages/elixir && mix credo"

[crates.lint.java]
precondition = "command -v mvn >/dev/null 2>&1"
check = "mvn -f packages/java/pom.xml spotless:check -q"

[crates.lint.wasm]
precondition = "command -v npx >/dev/null 2>&1"
format = "npx oxfmt packages/wasm/"
check = "npx oxlint packages/wasm/"

[crates.lint.r]
precondition = "command -v Rscript >/dev/null 2>&1"
format = "cd packages/r && Rscript -e 'styler::style_dir(\"R\")'"
check = "cd packages/r && Rscript -e 'lintr::lint_dir(\"R\")'"

[crates.lint.ffi]
precondition = "test -d e2e/c"
format = "find e2e/c -name '*.c' -o -name '*.h' | xargs clang-format -i"
check = "cppcheck --std=c11 --enable=warning,style,performance --suppress=missingIncludeSystem --suppress=unusedStructMember e2e/c/"

[crates.test.python]
precondition = "command -v uv >/dev/null 2>&1"
before = "cd e2e/python && uv sync && uv pip install --refresh ../../packages/python"
e2e = "cd e2e/python && uv run pytest tests/ -q"

[crates.test.node]
precondition = "command -v npx >/dev/null 2>&1"
before = "cd crates/html-to-markdown-node && napi build --output-dir . --release"
e2e = "cd e2e/node && npx vitest run"

[crates.test.go]
precondition = "command -v go >/dev/null 2>&1"
before = "cargo build --release -p html-to-markdown-ffi"
e2e = "cd e2e/go && go test ./... -count=1"

[crates.test.ruby]
precondition = "command -v bundle >/dev/null 2>&1"
before = "cd e2e/ruby && bundle install"
e2e = "cd e2e/ruby && bundle exec rspec"

[crates.test.php]
precondition = "command -v php >/dev/null 2>&1"
before = "cd e2e/php && composer install"
e2e = "cd e2e/php && composer test"

[crates.test.java]
precondition = "command -v mvn >/dev/null 2>&1"
before = "cargo build --release -p html-to-markdown-ffi"
e2e = "cd e2e/java && mvn test -q"

[crates.test.csharp]
precondition = "command -v dotnet >/dev/null 2>&1"
before = "cargo build --release -p html-to-markdown-ffi"
e2e = "dotnet test e2e/csharp"

[crates.test.elixir]
precondition = "command -v mix >/dev/null 2>&1"
before = "cd packages/elixir && mix deps.get && mix compile"
e2e = "cd e2e/elixir && mix deps.get && HTML_TO_MARKDOWN_BUILD=1 mix compile && HTML_TO_MARKDOWN_BUILD=1 mix test"

[crates.test.r]
precondition = "which Rscript 2>/dev/null"
e2e = "cd e2e/r && Rscript -e \"devtools::load_all('../../packages/r'); testthat::set_max_fails(Inf); testthat::test_dir('tests')\""

[crates.test.wasm]
precondition = "command -v npx >/dev/null 2>&1"
before = "wasm-pack build crates/html-to-markdown-wasm --release --target bundler && cd e2e/wasm && npm install"
e2e = "cd e2e/wasm && npm test"

[crates.test.rust]
precondition = "command -v cargo >/dev/null 2>&1"
e2e = "cd e2e/rust && cargo test"

[crates.test.c]
precondition = "command -v make >/dev/null 2>&1"
before = "cargo build --release -p html-to-markdown-ffi"
e2e = "cd e2e/c && make clean && make && DYLD_LIBRARY_PATH=../../target/release LD_LIBRARY_PATH=../../target/release ./run_tests"

[crates.build_commands.ruby]
precondition = "command -v cargo >/dev/null 2>&1"
build = "cd packages/ruby/ext/html_to_markdown_rb && cargo build"
build_release = "cd packages/ruby/ext/html_to_markdown_rb && cargo build --release"

[crates.publish]
core_crate = "crates/html-to-markdown"

[crates.publish.languages.ruby]
vendor_mode = "core-only"

[crates.publish.languages.elixir]
vendor_mode = "core-only"
nif_versions = ["2.16", "2.17"]

[crates.publish.languages.r]
vendor_mode = "full"

[crates.publish.languages.ffi]
pkg_config = true
cmake_config = true

[crates.e2e]
fixtures = "fixtures"
output = "e2e"
languages = [
  "python",
  "node",
  "ruby",
  "php",
  "c",
  "go",
  "java",
  "csharp",
  "elixir",
  "wasm",
  "r",
  "rust",
]
fields_optional = [
  "content",
  "document",
  "metadata.document.title",
  "metadata.document.description",
  "metadata.document.author",
  "metadata.document.canonical_url",
  "metadata.document.open_graph[title]",
  "metadata.document.open_graph[description]",
  "metadata.document.open_graph[image]",
  "metadata.document.open_graph[type]",
  "metadata.document.open_graph[url]",
  "metadata.document.open_graph[site_name]",
  "metadata.document.twitter_card[card]",
  "metadata.document.twitter_card[title]",
  "metadata.document.twitter_card[description]",
]

[crates.e2e.call]
function = "convert"
module = "html_to_markdown_rs"
result_var = "result"
args = [
  { name = "html", field = "html", type = "string" },
  { name = "options", field = "options", type = "json_object", optional = true },
]

[crates.e2e.call.overrides.rust]
crate_name = "html_to_markdown_rs"
module = "html_to_markdown_rs"
function = "convert"
options_type = "ConversionOptions"
wrap_options_in_some = true
returns_result = true

[crates.e2e.call.overrides.python]
module = "html_to_markdown"
function = "convert"
options_type = "ConversionOptions"
enum_module = "html_to_markdown.options"

[crates.e2e.call.overrides.python.enum_fields]
headingStyle = "HeadingStyle"
codeBlockStyle = "CodeBlockStyle"
listIndentType = "ListIndentType"
newlineStyle = "NewlineStyle"
whitespaceMode = "WhitespaceMode"
highlightStyle = "HighlightStyle"
linkStyle = "LinkStyle"
outputFormat = "OutputFormat"

[crates.e2e.call.overrides.node]
