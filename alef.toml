license = "MIT"
repository = "https://github.com/kreuzberg-dev/html-to-markdown"
authors = ["Kreuzberg Team"]
keywords = ["html", "markdown", "converter"]

[custom_modules]
node = ["helpers"]

[test.python]
command = "task python:test"
e2e = "cd e2e/python && python3 -m pytest tests/ -q"

[test.node]
command = "npx vitest run --config packages/typescript/vitest.config.ts"
e2e = "cd e2e/typescript && npx vitest run"

[test.go]
command = "task go:test"
e2e = "cd e2e/go && go test ./... -count=1"

[test.ruby]
command = "task ruby:test"

[test.php]
command = "task php:test"

[test.java]
command = "task java:test"

[test.csharp]
command = "task csharp:test"

[test.elixir]
command = "task elixir:test"
e2e = "cd e2e/elixir && mix test"

[test.r]
command = "task r:test"
e2e = "cd e2e/r && Rscript -e \"devtools::load_all('../../packages/r'); testthat::set_max_fails(Inf); testthat::test_dir('tests')\""

[test.wasm]
e2e = "cd e2e/wasm && npm test"

[test.rust]
e2e = "cd e2e/rust && cargo test"

[test.c]
e2e = "cd e2e/c && make clean && make && DYLD_LIBRARY_PATH=../../target/release ./test_runner"

# E2E test generation configuration
[e2e]
fixtures = "fixtures"
output = "e2e"
fields_optional = [
  "content",
  "document",
  "metadata.document.title",
  "metadata.document.description",
  "metadata.document.author",
  "metadata.document.canonical_url",
  "metadata.document.open_graph[title]",
  "metadata.document.open_graph[description]",
  "metadata.document.open_graph[image]",
  "metadata.document.open_graph[type]",
  "metadata.document.open_graph[url]",
  "metadata.document.open_graph[site_name]",
  "metadata.document.twitter_card[card]",
  "metadata.document.twitter_card[title]",
  "metadata.document.twitter_card[description]",
]

[e2e.call]
function = "convert"
module = "html_to_markdown"
result_var = "result"
args = [
  { name = "html", field = "html", type = "string" },
  { name = "options", field = "options", type = "json_object", optional = true },
]

