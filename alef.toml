[crates.test.csharp]
precondition = "command -v dotnet >/dev/null 2>&1"
before = "cargo build --release -p html-to-markdown-ffi && cp target/release/libhtml_to_markdown_ffi.dylib packages/csharp/HtmlToMarkdown/runtimes/osx-arm64/native/html_to_markdown_ffi.dylib"
e2e = "dotnet test e2e/csharp"

[crates.setup.node]
# Alef defaults `cd packages/node && pnpm install` for the Node binding setup,
# but packages/node/ no longer exists in this repo (the dead-weight scaffold
# was deleted; the real NAPI-RS crate lives at crates/html-to-markdown-node/
# and is wired into pnpm-workspace.yaml). Use a no-op precondition that
# matches the pnpm workspace install which runs in the workspace_install
# step earlier in CI.
precondition = "command -v pnpm >/dev/null 2>&1 && [ -f crates/html-to-markdown-node/package.json ]"
install = "pnpm --filter @kreuzberg/html-to-markdown-node install"
timeout_seconds = 600

[crates.setup.wasm]
# Same shape as [crates.setup.node]: alef's default `cd packages/wasm && pnpm
# install` points at a directory that no longer exists. The real wasm crate
# lives at crates/html-to-markdown-wasm/ (npm @kreuzberg/html-to-markdown-wasm),
# and is in pnpm-workspace.yaml.
precondition = "command -v pnpm >/dev/null 2>&1 && [ -f crates/html-to-markdown-wasm/package.json ]"
install = "pnpm --filter @kreuzberg/html-to-markdown-wasm install"
timeout_seconds = 600

[crates.setup.csharp]
# The alef default `dotnet restore $(find packages/csharp -maxdepth 3 ... | head -1)`
# picks the outer `packages/csharp/HtmlToMarkdown.csproj` (depth 2), but that
# project is an IDE-convenience wrapper whose `<ProjectReference>` to the inner
# `packages/csharp/HtmlToMarkdown/HtmlToMarkdown.csproj` (same assembly name)
# trips dotnet's `Ambiguous project name 'HtmlToMarkdown'` resolver. Restoring
# the inner csproj directly resolves the same dependency closure without
# running the name-resolution recursion, so we point the setup straight at it.
precondition = "command -v dotnet >/dev/null 2>&1 && [ -f packages/csharp/HtmlToMarkdown/HtmlToMarkdown.csproj ]"
install = "dotnet restore packages/csharp/HtmlToMarkdown/HtmlToMarkdown.csproj"
timeout_seconds = 600

