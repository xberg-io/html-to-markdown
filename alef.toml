[workspace]
alef_version = "0.17.13"
languages = [
  "python",
  "node",
  "ruby",
  "php",
  "ffi",
  "go",
  "java",
  "csharp",
  "elixir",
  "wasm",
  "r",
  "kotlin_android",
  "jni",
  "swift",
  "dart",
  "zig",
]

[workspace.sync]
extra_paths = [
  "packages/ruby/lib/html_to_markdown/version.rb",
  "packages/python/html_to_markdown/__init__.py",
  "crates/html-to-markdown-node/package.json",
  "crates/html-to-markdown-node/npm/*/package.json",
  "package.json",
]

[workspace.citation]
title = "html-to-markdown"
abstract = "Fast, lossless HTML to Markdown engine."
repository-code = "https://github.com/kreuzberg-dev/html-to-markdown"
url = "https://kreuzberg.dev"
license = "MIT"
date-released = "2026-05-17"

[[workspace.citation.authors]]
family-names = "Hirschfeld"
given-names = "Na'aman"
email = "naaman@kreuzberg.dev"
orcid = "https://orcid.org/0009-0000-2247-5072"

# test_apps version sync — use text_replacements to avoid clobbering unrelated semver strings
[[workspace.sync.text_replacements]]
path = "test_apps/node/package.json"
search = '"@kreuzberg/html-to-markdown": "[^"]*"'
replace = '"@kreuzberg/html-to-markdown": "{version}"'

[[workspace.sync.text_replacements]]
path = "test_apps/bun/package.json"
search = '"@kreuzberg/html-to-markdown": "[^"]*"'
replace = '"@kreuzberg/html-to-markdown": "{version}"'

[[workspace.sync.text_replacements]]
path = "test_apps/wasm/package.json"
search = '"@kreuzberg/html-to-markdown-wasm": "[^"]*"'
replace = '"@kreuzberg/html-to-markdown-wasm": "{version}"'

# Anchor on artifactId so we don't accidentally rewrite junit/jackson <version> tags.
# Use double-quoted (basic) strings so the \n in the replacement is a real newline.
[[workspace.sync.text_replacements]]
path = "test_apps/java/pom.xml"
search = "<artifactId>html-to-markdown</artifactId>\\s*<version>[^<]*</version>"
replace = "<artifactId>html-to-markdown</artifactId>\n            <version>{version}</version>"

[[workspace.sync.text_replacements]]
path = "test_apps/csharp/KreuzbergDev.HtmlToMarkdown.E2eTests.csproj"
search = 'Include="KreuzbergDev.HtmlToMarkdown" Version="[^"]*"'
replace = 'Include="KreuzbergDev.HtmlToMarkdown" Version="{version}"'

[[workspace.sync.text_replacements]]
path = "test_apps/php/composer.json"
search = '"kreuzberg-dev/html-to-markdown": "[^"]*"'
replace = '"kreuzberg-dev/html-to-markdown": ">={version}"'

[[workspace.sync.text_replacements]]
path = "test_apps/python/pyproject.toml"
search = '"html-to-markdown>=[^"]*"'
replace = '"html-to-markdown>={version}"'

[[workspace.sync.text_replacements]]
path = "test_apps/ruby/Gemfile"
search = "gem 'html-to-markdown', '[^']*'"
replace = "gem 'html-to-markdown', '~> {version}'"

[[workspace.sync.text_replacements]]
path = "test_apps/go/go.mod"
search = 'github\.com/kreuzberg-dev/html-to-markdown/packages/go/v3 v[0-9][^\s]*'
replace = "github.com/kreuzberg-dev/html-to-markdown/packages/go/v3 v{version}"

[[workspace.sync.text_replacements]]
path = "test_apps/r/DESCRIPTION"
search = 'htmltomarkdown \([^)]*\)'
replace = 'htmltomarkdown ({version})'

[[workspace.sync.text_replacements]]
path = "test_apps/rust/Cargo.toml"
search = 'package = "html-to-markdown-rs", version = "[^"]*"'
replace = 'package = "html-to-markdown-rs", version = "{version}"'

[[crates]]
name = "html-to-markdown-rs"
core_import = "html_to_markdown_rs"
error_type = "ConversionError"
error_constructor = "html_to_markdown_rs::ConversionError::Other({msg})"
sources = [
  "crates/html-to-markdown/src/lib.rs",
  "crates/html-to-markdown/src/options/conversion.rs",
  "crates/html-to-markdown/src/options/preprocessing.rs",
  "crates/html-to-markdown/src/options/validation.rs",
  "crates/html-to-markdown/src/types/result.rs",
  "crates/html-to-markdown/src/types/document.rs",
  "crates/html-to-markdown/src/types/tables.rs",
  "crates/html-to-markdown/src/types/warnings.rs",
  "crates/html-to-markdown/src/error.rs",
  "crates/html-to-markdown/src/convert_api.rs",
  "crates/html-to-markdown/src/metadata/types.rs",
  "crates/html-to-markdown/src/visitor/traits.rs",
  "crates/html-to-markdown/src/visitor/types.rs",
  "crates/html-to-markdown/src/visitor/default_impl.rs",
]
version_from = "Cargo.toml"
workspace_root = "."
features = ["full", "metadata", "visitor", "serde", "inline-images"]

[crates.python]
module_name = "_html_to_markdown"
pip_name = "html-to-markdown"

[crates.python.stubs]
output = "packages/python/html_to_markdown/"

[crates.node]
package_name = "@kreuzberg/html-to-markdown-node"

[crates.ruby]
gem_name = "html-to-markdown"
exclude_types = ["ConversionOptionsBuilder", "VisitorHandle"]

[crates.ruby.stubs]
output = "packages/ruby/sig/"

[crates.php]
extension_name = "html_to_markdown"
namespace = "HtmlToMarkdown"

[crates.elixir]
app_name = "html_to_markdown"
exclude_types = ["VisitorHandle", "ConversionOptionsBuilder"]
cpu_bound_functions = ["convert"]

[crates.ffi]
prefix = "htm"
header_name = "html_to_markdown.h"
lib_name = "html_to_markdown_ffi"
visitor_callbacks = true

[crates.go]
module = "github.com/kreuzberg-dev/html-to-markdown/packages/go/v3"
package_name = "htmltomarkdown"

[crates.java]
package = "dev.kreuzberg.htmltomarkdown"
group_id = "dev.kreuzberg"
artifact_id = "html-to-markdown"

[crates.csharp]
namespace = "HtmlToMarkdown"

[crates.r]
package_name = "htmltomarkdown"

[crates.kotlin_android]
# Android library (AAR) only — Kotlin/JVM users consume the existing Java
# package directly. Panama FFM is unavailable on Android (max JDK 17), which
# is why Android needs its own JNI-based package with bundled .so files.
# Emitted by alef-backend-kotlin-android (alef >= 0.16.6).
package = "dev.kreuzberg.android"
namespace = "dev.kreuzberg.android"
artifact_id = "html-to-markdown-android"
group_id = "dev.kreuzberg"
abis = ["arm64-v8a", "x86_64"]
# JNI trait-handle bridge (mirror dart trait_bridge) is not yet implemented in
# alef-backend-jni; Option<VisitorHandle> cannot be serde-deserialised from JSON.
exclude_functions = ["visitor"]

[crates.swift]
module_name = "HtmlToMarkdown"
package_name = "HtmlToMarkdown"
features = ["full"]

[crates.dart]
# Pure-Dart binding (no Flutter SDK dependency) — h2m is server/CLI work.
# Pub.dev name `h2m` because `html_to_markdown` and `html-to-markdown` are taken.
pubspec_name = "h2m"
lib_name = "h2m"
style = "frb"
features = ["full"]

[crates.zig]
module_name = "html_to_markdown_rs"

[crates.output]
python = "crates/html-to-markdown-py/src/"
node = "crates/html-to-markdown-node/src/"
ruby = "packages/ruby/ext/html_to_markdown_rb/src/"
php = "crates/html-to-markdown-php/src/"
ffi = "crates/html-to-markdown-ffi/src/"
go = "packages/go/"
java = "packages/java/src/main/java/"
elixir = "packages/elixir/native/html_to_markdown_nif/src/"
wasm = "crates/html-to-markdown-wasm/src/"
r = "packages/r/src/rust/src/"
kotlin_android = "packages/kotlin-android/src/main/kotlin/dev/kreuzberg/android/"
swift = "packages/swift/Sources/HtmlToMarkdown/"
dart = "packages/dart/lib/src/"
zig = "packages/zig/src/"

[crates.exclude]
types = []
functions = []
methods = []

[crates.include]
