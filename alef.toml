"metadata.title" = "metadata.document.title"
"metadata.description" = "metadata.document.description"
"metadata.author" = "metadata.document.author"
"metadata.canonical_url" = "metadata.document.canonical_url"
# Collection metadata fields (returned as JSON strings in C FFI)
"metadata.headings" = "metadata.headers"
# Open Graph map fields
"metadata.open_graph.title" = "metadata.document.open_graph[title]"
"metadata.open_graph.description" = "metadata.document.open_graph[description]"
"metadata.open_graph.image" = "metadata.document.open_graph[image]"
"metadata.open_graph.type" = "metadata.document.open_graph[type]"
"metadata.open_graph.url" = "metadata.document.open_graph[url]"
"metadata.open_graph.site_name" = "metadata.document.open_graph[site_name]"
# Twitter Card map fields
"metadata.twitter.card" = "metadata.document.twitter_card[card]"
"metadata.twitter.title" = "metadata.document.twitter_card[title]"
"metadata.twitter.description" = "metadata.document.twitter_card[description]"

[e2e.format]
python = "ruff check --fix {dir} && ruff format {dir}"
go = "gofmt -w {dir}"
rust = "cargo fmt --manifest-path {dir}/Cargo.toml"

[e2e.fields_c_types]
"conversion_result.metadata" = "HtmlMetadata"
"conversion_result.document" = "DocumentStructure"
"html_metadata.document" = "DocumentMetadata"
