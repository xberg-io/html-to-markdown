[package]
name = "html-to-markdown-r"
version = "3.6.0-rc.4"
edition = "2024"
license = "MIT"
description = "High-performance HTML to Markdown converter"
readme = false
keywords = ["converter", "html", "markdown"]
categories = ["text-processing"]

[lib]
crate-type = ["staticlib", "lib"]

[dependencies]
async-trait = "0.1"
extendr-api = "0.9"
html-to-markdown-rs = { version = "3.6.0-rc.4", path = "../../../../crates/html-to-markdown", features = ["full", "metadata", "visitor", "serde", "inline-images", "testkit"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
