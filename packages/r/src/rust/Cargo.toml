[workspace]

[package]
name = "html_to_markdown_r"
version = "3.1.0"
edition = "2024"
license = "MIT"
description = "extendr bindings for html-to-markdown"
repository = "https://github.com/kreuzberg-dev/html-to-markdown"

[lib]
name = "html_to_markdown_r"
crate-type = ["staticlib"]

[dependencies]
html-to-markdown-rs = { path = "vendor/html-to-markdown-rs", features = [
  "inline-images",
  "metadata",
  "visitor",
] }
extendr-api = "0.8"
serde_json = "1.0"

[features]
default = ["metadata"]
metadata = []

[package.metadata.cargo-machete]
ignored = ["extendr-api", "html-to-markdown-rs"]
