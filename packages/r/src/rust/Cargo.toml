[package]
name = "html-to-markdown-r"
version = "3.6.0-rc.19"
edition = "2024"
license = "MIT"
description = "High-performance HTML to Markdown converter"
readme = false
keywords = ["converter", "html", "markdown"]
categories = []

[lib]
crate-type = ["staticlib", "lib"]

[dependencies]
async-trait = "0.1"
extendr-api = "0.9"
html-to-markdown-rs = { version = "3.6.0-rc.19", path = "../../../../crates/html-to-markdown", features = ["serde", "metadata", "visitor", "inline-images", "testkit"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
