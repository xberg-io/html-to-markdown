[package]
name = "html_to_markdown_nif"
version = "3.6.7"
edition = "2024"
license = "MIT"
description = "High-performance HTML to Markdown converter"
readme = false
keywords = ["converter", "html", "markdown"]
categories = []

[package.metadata.cargo-machete]
ignored = [
    "tokio",
    "async-trait",
    "alloc-no-stdlib",
    "alloc-stdlib",
    "brotli-decompressor",
]

[workspace]

[lib]
name = "html_to_markdown_nif"

crate-type = ["cdylib"]

[dependencies]
alloc-no-stdlib = "=2.0.4"
alloc-stdlib = "=0.2.2"
async-trait = "0.1"
brotli-decompressor = "=5.0.1"
html-to-markdown-rs = { version = "3.6.7", path = "../../../../crates/html-to-markdown", features = ["serde", "metadata", "visitor", "inline-images", "testkit"] }
rustler = "0.38"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "sync"] }
