[package]
name = "html_to_markdown_nif"
version = "3.4.0-rc.27"
edition = "2024"
license = "MIT"
description = "High-performance HTML to Markdown converter"
readme = false
keywords = ["html", "markdown", "converter"]
categories = ["text-processing"]

[package.metadata.cargo-machete]
ignored = ["async-trait"]

[workspace]

[lib]
name = "html_to_markdown_nif"
crate-type = ["cdylib"]

[dependencies]
async-trait = "0.1"
html-to-markdown-rs = { path = "../../../../crates/html-to-markdown", features = [
  "full",
  "metadata",
  "visitor",
  "serde",
  "inline-images",
] }
rustler = "0.37"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "sync"] }
