[package]
name = "html_to_markdown_nif"
version = "3.6.3"
edition = "2024"
license = "MIT"
description = "High-performance HTML to Markdown converter"
readme = false
keywords = ["converter", "html", "markdown"]
categories = []

[package.metadata.cargo-machete]
ignored = ["tokio", "async-trait"]

[workspace]

[lib]
name = "html_to_markdown_nif"

crate-type = ["cdylib"]

[dependencies]
async-trait = "0.1"
html-to-markdown-rs = { version = "3.6.3", path = "../../../../crates/html-to-markdown", features = ["serde", "metadata", "visitor", "inline-images", "testkit"] }
rustler = "0.38"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "sync"] }
