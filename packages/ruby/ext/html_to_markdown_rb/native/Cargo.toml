[package]
name = "html-to-markdown-rb"
version = "3.5.0"
edition = "2024"
license = "MIT"
description = "High-performance HTML to Markdown converter"
readme = false
keywords = ["html", "markdown", "converter"]
categories = ["text-processing"]

[lib]
name = "html_to_markdown_rb"
path = "../src/lib.rs"
crate-type = ["cdylib"]

[dependencies]
async-trait = "0.1"
html-to-markdown-rs = { version = "3.5.0", path = "../../../../../crates/html-to-markdown", features = ["full", "metadata", "visitor", "serde", "inline-images"] }
magnus = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread"] }
