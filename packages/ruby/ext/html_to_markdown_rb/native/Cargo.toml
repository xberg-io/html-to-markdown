[package]
name = "html-to-markdown-rb"
version = "3.6.0-rc.6"
edition = "2024"
license = "MIT"
description = "High-performance HTML to Markdown converter"
readme = false
keywords = ["converter", "html", "markdown"]
categories = ["text-processing"]

[package.metadata.cargo-machete]
ignored = ["tokio", "async-trait"]

[lib]
name = "html_to_markdown_rb"
path = "../src/lib.rs"
crate-type = ["cdylib"]

[dependencies]
async-trait = "0.1"
html-to-markdown-rs = { version = "3.6.0-rc.6", path = "../../../../../crates/html-to-markdown", features = ["full", "metadata", "visitor", "serde", "inline-images", "testkit"] }
magnus = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread"] }
