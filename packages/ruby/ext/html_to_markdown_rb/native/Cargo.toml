[package]
name = "html-to-markdown-rb"
version = "3.6.2"
edition = "2024"
license = "MIT"
description = "High-performance HTML to Markdown converter"
readme = false
keywords = ["converter", "html", "markdown"]
categories = []

[package.metadata.cargo-machete]
ignored = ["rb-sys"]

[lib]
name = "html_to_markdown_rb"
path = "../src/lib.rs"
crate-type = ["cdylib"]

[dependencies]
async-trait = "0.1"
html-to-markdown-rs = { version = "3.6.2", path = "../../../../../crates/html-to-markdown", features = ["serde", "metadata", "visitor", "inline-images", "testkit"] }
magnus = "0.8"
rb-sys = ">=0.9, <0.9.128"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread"] }
