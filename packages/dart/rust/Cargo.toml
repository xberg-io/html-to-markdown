[package]
name = "html-to-markdown-rs-dart"
version = "3.6.15"
edition = "2024"
license = "MIT"

[package.metadata.cargo-machete]
# Umbrella + sibling crates are pulled in so flutter_rust_bridge can resolve
# every referenced type, but the generated Rust wrapper only `use`s a subset.
ignored = ["html_to_markdown_rs"]

[lib]
crate-type = ["cdylib", "staticlib"]
[features]
default = ["inline-images", "metadata", "testkit", "visitor"]
inline-images = ["html_to_markdown_rs/inline-images"]
metadata = ["html_to_markdown_rs/metadata"]
testkit = ["html_to_markdown_rs/testkit"]
visitor = ["html_to_markdown_rs/visitor"]

[dependencies]
async-trait = "0.1"
flutter_rust_bridge = "=2.12.0"
html_to_markdown_rs = { path = "../../../crates/html-to-markdown", package = "html-to-markdown-rs", features = ["full", "testkit"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "sync"] }

[lints.rust]
# flutter_rust_bridge uses #[cfg(frb_expand)] internally during macro expansion.
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(frb_expand)'] }
