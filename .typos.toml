[default.extend-words]
# Tools and proper nouns that look like typos
delocate = "delocate"
# Jackson Java package path segment `databind.ser.std.StdSerializer`
ser = "ser"

[files]
extend-exclude = [
  # Test fixtures and real-world HTML samples contain intentional
  # misspellings, non-English text, and obfuscated class names
  "test_documents/",
  "fixtures/",
  "test_apps/",
  # Test spec data (CommonMark spec, R inst/)
  "packages/python/tests/",
  "packages/r/inst/",
  # Generated/bundled demo assets
  "docs/demo/",
  # Vendored and generated files
  "*.lock",
  "vendor/",
  "node_modules/",
  "target/",
  "dist/",
  ".alef/",
  "*.svg",
  # Gradle/Kotlin build outputs
  "e2e/kotlin_android/build/",
  "packages/kotlin-android/build/",
  # Zig build cache (cimport.zig pulls in darwin headers with ARM SME refs)
  "**/.zig-cache/",
  # Dart build cache
  "**/.dart_tool/",
  # Swift build cache
  "**/.build/",
]
