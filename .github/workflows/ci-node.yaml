name: CI Node

on:
  push:
    branches: [main]
    paths:
      - packages/typescript/**
      - scripts/publish/node/**
      - crates/html-to-markdown-node/**
      - crates/html-to-markdown/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .task/**
      - Taskfile.yaml
      - .github/workflows/ci-node.yaml
  pull_request:
    branches: [main]
    paths:
      - packages/typescript/**
      - scripts/publish/node/**
      - crates/html-to-markdown-node/**
      - crates/html-to-markdown/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .task/**
      - Taskfile.yaml
      - .github/workflows/ci-node.yaml

permissions:
  contents: read

concurrency:
  group: ci-node-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  node-bindings:
    name: Test ${{ matrix.runtime }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        runtime: [node, bun]
        exclude:
          # Bun has limited Windows support, skip for now
          - os: windows-latest
            runtime: bun
    steps:
      - name: Checkout
        uses: actions/checkout@v6 # v6

      - name: Install Task
        uses: go-task/setup-task@v2 # v2
        with:
          version: 3.46.4

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1 # v1

      - name: Setup Node.js workspace
        if: matrix.runtime == 'node'
        uses: kreuzberg-dev/actions/setup-node-workspace@v1 # v1

      - name: Setup Bun
        if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@v2 # v2
        with:
          bun-version: latest

      - name: Build NAPI-RS Bindings (Node.js)
        if: matrix.runtime == 'node'
        uses: kreuzberg-dev/actions/build-node-napi@v1 # v1
        with:
          crate-dir: crates/html-to-markdown-node

      - name: Install workspace dependencies (Bun)
        if: matrix.runtime == 'bun'
        run: bun install
        shell: bash

      - name: Build NAPI-RS Bindings (Bun)
        if: matrix.runtime == 'bun'
        working-directory: crates/html-to-markdown-node
        run: bun run build
        shell: bash

      - name: Run Rust Tests (Node.js only)
        if: matrix.runtime == 'node'
        run: task rust:test
        shell: bash

      - name: Build TypeScript package (Node.js)
        if: matrix.runtime == 'node'
        uses: ./.github/actions/build-typescript

      - name: Build TypeScript package (Bun)
        if: matrix.runtime == 'bun'
        working-directory: packages/typescript
        run: bun x tsc --project tsconfig.json
        shell: bash

      - name: Run E2E tests
        if: matrix.runtime == 'node'
        run: task node:e2e:test
        shell: bash
