name: CI Node

on:
  push:
    branches: [main]
    paths:
      - packages/typescript/**
      - scripts/publish/node/**
      - crates/html-to-markdown-node/**
      - crates/html-to-markdown/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .task/**
      - Taskfile.yaml
      - .github/workflows/ci-node.yaml
  pull_request:
    branches: [main]
    paths:
      - packages/typescript/**
      - scripts/publish/node/**
      - crates/html-to-markdown-node/**
      - crates/html-to-markdown/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .task/**
      - Taskfile.yaml
      - .github/workflows/ci-node.yaml

permissions:
  contents: read

concurrency:
  group: ci-node-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  node-bindings:
    name: Test ${{ matrix.runtime }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        runtime: [node, bun]
        exclude:
          # Bun has limited Windows support, skip for now
          - os: windows-latest
            runtime: bun
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Task
        uses: go-task/setup-task@0ab1b2a65bc55236a3bc64cde78f80e20e8885c2 # v1.0.0
        with:
          version: 3.46.4

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@c964c3c295858254aa86d78cf36bd66bd9364e9a # v1.0.0

      - name: Setup Node.js workspace
        if: matrix.runtime == 'node'
        uses: kreuzberg-dev/actions/setup-node-workspace@c964c3c295858254aa86d78cf36bd66bd9364e9a # v1.0.0

      - name: Setup Bun
        if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Build NAPI-RS Bindings (Node.js)
        if: matrix.runtime == 'node'
        uses: kreuzberg-dev/actions/build-node-napi@c964c3c295858254aa86d78cf36bd66bd9364e9a # v1.0.0
        with:
          crate-dir: crates/html-to-markdown-node

      - name: Install workspace dependencies (Bun)
        if: matrix.runtime == 'bun'
        run: bun install
        shell: bash

      - name: Build NAPI-RS Bindings (Bun)
        if: matrix.runtime == 'bun'
        working-directory: crates/html-to-markdown-node
        run: bun run build
        shell: bash

      - name: Test NAPI-RS Bindings (Node.js)
        if: matrix.runtime == 'node'
        run: task node:test
        shell: bash

      - name: Run Rust Tests (Node.js only)
        if: matrix.runtime == 'node'
        run: task rust:test
        shell: bash

      - name: Build TypeScript package (Node.js)
        if: matrix.runtime == 'node'
        uses: ./.github/actions/build-typescript

      - name: Build TypeScript package (Bun)
        if: matrix.runtime == 'bun'
        working-directory: packages/typescript
        run: bun x tsc --project tsconfig.json
        shell: bash

      - name: Test TypeScript Package (Node.js)
        if: matrix.runtime == 'node'
        run: task typescript:test:ci
        shell: bash

      - name: Test TypeScript Package (Bun)
        if: matrix.runtime == 'bun'
        working-directory: packages/typescript
        run: bun test
        shell: bash
