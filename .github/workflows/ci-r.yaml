name: CI R

on:
  push:
    branches: [main]
    paths:
      - packages/r/**
      - scripts/publish/r/**
      - crates/html-to-markdown/**
      - .task/**
      - Taskfile.yaml
      - .github/workflows/ci-r.yaml
  pull_request:
    branches: [main]
    paths:
      - packages/r/**
      - scripts/publish/r/**
      - crates/html-to-markdown/**
      - .task/**
      - Taskfile.yaml
      - .github/workflows/ci-r.yaml

permissions:
  contents: read

concurrency:
  group: ci-r-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  r:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup R
        uses: kreuzberg-dev/actions/setup-r@c964c3c295858254aa86d78cf36bd66bd9364e9a # v1.0.0
        with:
          install-deps-script: scripts/ci/r/install-deps.sh

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@c964c3c295858254aa86d78cf36bd66bd9364e9a # v1.0.0

      - name: Run tests
        working-directory: packages/r
        run: ../../scripts/ci/r/run-tests.sh
        shell: bash

      - name: Run lintr
        working-directory: packages/r
        run: ../../scripts/ci/r/run-lintr.sh
        shell: bash
