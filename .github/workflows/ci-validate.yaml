name: CI Validate

on:
  push:
    branches: [main]
    paths:
      - "**"
      - .task/**
      - Taskfile.yaml
      - ".github/workflows/ci-validate.yaml"
  pull_request:
    branches: [main]
    paths:
      - "**"
      - .task/**
      - Taskfile.yaml
      - ".github/workflows/ci-validate.yaml"

permissions:
  contents: read

concurrency:
  group: ci-validate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25.5"
  GO_TOOLCHAIN: "go1.25.5"
  GOLANGCI_LINT_VERSION: "v2.7.2"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Task
        uses: go-task/setup-task@0ab1b2a65bc55236a3bc64cde78f80e20e8885c2 # v1.0.0
        with:
          version: 3.46.4

      - name: Install uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.5.0
        with:
          enable-cache: true

      - name: Install Prek
        run: scripts/ci/validate/install-prek.sh
        shell: bash

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@f43a03ba22ebb2cab85676d36968ac0f96c34215 # v1.0.0
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "25"

      - name: Setup Elixir
        uses: erlef/setup-beam@ee09b1e59bb240681c382eb1f0abc6a04af72764 # v1.23.0
        with:
          elixir-version: "1.19"
          otp-version: "28.1"

      - name: Install Elixir Dependencies
        run: task elixir:install
        shell: bash

      - name: Setup R
        uses: kreuzberg-dev/actions/setup-r@f43a03ba22ebb2cab85676d36968ac0f96c34215 # v1.0.0
        with:
          install-deps-script: scripts/ci/r/install-deps.sh

      - name: Setup Ruby
        uses: ruby/setup-ruby@4eb9f110bac952a8b68ecf92e3b5c7a987594ba6 # v1.292.0
        with:
          ruby-version: "3.3"
          bundler-cache: false

      - name: Install Ruby Dependencies
        run: task ruby:install
        shell: bash

      - name: Setup Node Workspace
        uses: kreuzberg-dev/actions/setup-node-workspace@f43a03ba22ebb2cab85676d36968ac0f96c34215 # v1.0.0

      - name: Install Dependencies
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3.0.2
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 30
          command: uv sync --all-extras --no-install-workspace
          shell: bash

      - name: Install Go Lint Dependencies
        run: task go:install
        shell: bash

      - name: Setup PHP
        uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1 # 2.36.0
        with:
          php-version: "8.4"
          tools: composer:2.9.1
          coverage: none

      - name: Install PHP Dependencies
        run: task php:install
        shell: bash

      - name: Run Lint Checks
        run: task lint:check
        shell: bash

      - name: Check Code Formatting
        run: task format:check
        shell: bash

      - name: Install C/C++ tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends cppcheck clang-format

      - name: Load Cached Prek Dependencies
        id: cached-prek-dependencies
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.cache/prek/
          key: prek|${{ env.pythonLocation }}|${{ hashFiles('.prek-config.yaml') }}

      - name: Run Pre-commit Hooks
        env:
          SKIP: golangci-lint-packages,golangci-lint-examples
        run: task pre-commit:run
        shell: bash

      - name: Install Python README Dependencies
        run: pip install pyyaml jinja2
        shell: bash

      - name: Validate READMEs
        run: task docs:generate-readme:check
        shell: bash
