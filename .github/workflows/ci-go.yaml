name: CI Go

on:
  push:
    branches: [main]
    paths:
      - packages/go/**
      - scripts/publish/go/**
      - crates/html-to-markdown-ffi/**
      - crates/html-to-markdown/**
      - go.mod
      - go.sum
      - .task/**
      - Taskfile.yaml
      - .github/workflows/ci-go.yaml
  pull_request:
    branches: [main]
    paths:
      - packages/go/**
      - scripts/publish/go/**
      - crates/html-to-markdown-ffi/**
      - crates/html-to-markdown/**
      - go.mod
      - go.sum
      - .task/**
      - Taskfile.yaml
      - .github/workflows/ci-go.yaml

permissions:
  contents: read

concurrency:
  group: ci-go-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26.0"
  GO_TOOLCHAIN: "go1.26.0"
  GOLANGCI_LINT_VERSION: "latest"

jobs:
  detect-go-modules:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.set-modules.outputs.modules }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6 # v6

      - name: Detect Go modules
        id: set-modules
        shell: bash
        run: scripts/ci/go/detect-go-modules.sh

  golangci-lint:
    name: golangci-lint (${{ matrix.module }})
    needs: detect-go-modules
    if: ${{ needs.detect-go-modules.outputs.modules != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.detect-go-modules.outputs.modules) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6 # v6

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1 # v1

      - name: Build FFI library
        run: cargo build --release -p html-to-markdown-ffi
        shell: bash

      - name: Setup Go
        uses: actions/setup-go@v6 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - name: Install golangci-lint
        env:
          GOTOOLCHAIN: ${{ env.GO_TOOLCHAIN }}
        run: scripts/ci/go/install-golangci-lint.sh
        shell: bash

      - name: Run golangci-lint
        working-directory: ${{ matrix.module }}
        run: ${{ github.workspace }}/scripts/ci/go/run-golangci-lint.sh
        shell: bash

  go-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6 # v6

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1 # v1

      - name: Setup Go
        uses: actions/setup-go@v6 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - name: Install Task
        uses: go-task/setup-task@v2 # v2
        with:
          version: 3.46.4

      - name: Run E2E tests
        run: task go:e2e:test
        shell: bash
