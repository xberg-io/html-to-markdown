name: CI Elixir

on:
  push:
    branches: [main]
    paths:
      - packages/elixir/**
      - scripts/publish/elixir/**
      - crates/html-to-markdown-ffi/**
      - crates/html-to-markdown/**
      - .task/**
      - Taskfile.yaml
      - .github/workflows/ci-elixir.yaml
  pull_request:
    branches: [main]
    paths:
      - packages/elixir/**
      - scripts/publish/elixir/**
      - crates/html-to-markdown-ffi/**
      - crates/html-to-markdown/**
      - .task/**
      - Taskfile.yaml
      - .github/workflows/ci-elixir.yaml

permissions:
  contents: read

concurrency:
  group: ci-elixir-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  elixir:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Elixir
        uses: erlef/setup-beam@9d5b75ddfda22fb979d2270283237aef8aa68d6b # v1.22.0
        with:
          elixir-version: "1.19"
          otp-version: "28.1"

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@c964c3c295858254aa86d78cf36bd66bd9364e9a # v1.0.0

      - name: Install Hex/Rebar
        run: scripts/ci/elixir/install-hex-rebar.sh
        shell: bash

      - name: Install dependencies
        working-directory: packages/elixir
        run: ../../scripts/ci/elixir/install-deps.sh
        shell: bash

      - name: Run tests
        working-directory: packages/elixir
        run: ../../scripts/ci/elixir/run-tests.sh
        shell: bash

      - name: Credo lint
        working-directory: packages/elixir
        run: ../../scripts/ci/elixir/run-credo.sh
        shell: bash
