name: CI PHP

on:
  push:
    branches: [main]
    paths:
      - packages/php/**
      - packages/php-ext/**
      - scripts/publish/php/**
      - crates/html-to-markdown-php/**
      - crates/html-to-markdown/**
      - composer.json
      - composer.lock
      - .task/**
      - Taskfile.yaml
      - .github/workflows/ci-php.yaml
  pull_request:
    branches: [main]
    paths:
      - packages/php/**
      - packages/php-ext/**
      - scripts/publish/php/**
      - crates/html-to-markdown-php/**
      - crates/html-to-markdown/**
      - composer.json
      - composer.lock
      - .task/**
      - Taskfile.yaml
      - .github/workflows/ci-php.yaml

permissions:
  contents: read

concurrency:
  group: ci-php-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  php-bindings:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup PHP
        uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1 # 2.36.0
        with:
          php-version: "8.4"
          tools: composer:2.9.1
          coverage: none

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@c964c3c295858254aa86d78cf36bd66bd9364e9a # v1.0.0

      - name: Capture php-config path
        run: scripts/ci/php/set-php-config.sh
        shell: bash

      - name: Install root Composer dependencies
        uses: ramsey/composer-install@a35c6ebd3d08125aaf8852dff361e686a1a67947 # 3.2.0
        with:
          dependency-versions: locked
        env:
          COMPOSER_AUTH: '{"github-oauth":{"github.com":"${{ secrets.GITHUB_TOKEN }}"}}'

      - name: Install PHP package Composer dependencies
        uses: ramsey/composer-install@a35c6ebd3d08125aaf8852dff361e686a1a67947 # 3.2.0
        with:
          dependency-versions: locked
          working-directory: packages/php
        env:
          COMPOSER_AUTH: '{"github-oauth":{"github.com":"${{ secrets.GITHUB_TOKEN }}"}}'

      - name: Build PHP extension
        id: build-php-extension
        uses: kreuzberg-dev/actions/build-php-extension@c964c3c295858254aa86d78cf36bd66bd9364e9a # v1.0.0
        with:
          crate-name: html-to-markdown-php
          lib-name: html_to_markdown_php

      - name: Run PHP static analysis
        run: scripts/ci/php/run-phpstan.sh
        shell: bash

      - name: Run PHP tests
        run: scripts/ci/php/run-php-tests.sh
        shell: bash
        env:
          EXTENSION_PATH: ${{ steps.build-php-extension.outputs.extension-path }}
