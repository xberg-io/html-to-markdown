name: CI Python

on:
  push:
    branches: [main]
    paths:
      - packages/python/**
      - scripts/publish/python/**
      - crates/html-to-markdown-py/**
      - crates/html-to-markdown/**
      - pyproject.toml
      - uv.lock
      - uv.toml
      - .task/**
      - Taskfile.yaml
      - .github/workflows/ci-python.yaml
  pull_request:
    branches: [main]
    paths:
      - packages/python/**
      - scripts/publish/python/**
      - crates/html-to-markdown-py/**
      - crates/html-to-markdown/**
      - pyproject.toml
      - uv.lock
      - uv.toml
      - .task/**
      - Taskfile.yaml
      - .github/workflows/ci-python.yaml

permissions:
  contents: read

concurrency:
  group: ci-python-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.10", "3.12", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Task
        uses: go-task/setup-task@0ab1b2a65bc55236a3bc64cde78f80e20e8885c2 # v1.0.0
        with:
          version: 3.46.4

      - name: Install uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.5.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python }}

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@c964c3c295858254aa86d78cf36bd66bd9364e9a # v1.0.0
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Install Dependencies
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3.0.2
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            if [[ "${{ runner.os }}" == "Windows" ]] && [[ -d ".venv" ]]; then
              echo "Removing existing .venv directory on Windows"
              rm -rf .venv
            fi
            uv sync --all-extras --no-install-workspace
          shell: bash

      - name: Build Python Bindings
        run: |
          uv pip install maturin
          cd packages/python && uv run maturin develop --release
        shell: bash

      - name: Run Python Tests
        run: task python:test:ci
        shell: bash
