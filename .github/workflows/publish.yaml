    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Download Hex artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: elixir-hex-package
          path: dist/elixir

      - name: Upload Elixir package to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: scripts/publish/upload-elixir-package.sh
        shell: bash

      - name: Setup Elixir
        uses: erlef/setup-beam@9d5b75ddfda22fb979d2270283237aef8aa68d6b # v1.22.0
        with:
          elixir-version: "1.19"
          otp-version: "28.1"

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@f43a03ba22ebb2cab85676d36968ac0f96c34215 # v1.0.0

      - name: Install Hex/Rebar
        run: scripts/publish/elixir/install-hex-rebar.sh
        shell: bash

      - name: Install dependencies
        run: scripts/publish/elixir/install-deps.sh
        shell: bash

      - name: Stage Rust core and generate lockfile
        shell: bash
        run: |
          scripts/publish/elixir/stage-rust-core.sh
          pushd packages/elixir/native/html_to_markdown_elixir >/dev/null
          cargo generate-lockfile
          popd >/dev/null

      - name: Publish to Hex.pm
        uses: kreuzberg-dev/actions/publish-hex@f43a03ba22ebb2cab85676d36968ac0f96c34215 # v1.0.0
        with:
          package-dir: packages/elixir
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}

  publish-nuget:
    name: Publish NuGet package
    needs: [prepare, csharp-package, check-nuget]
    if: ${{ needs.prepare.result == 'success' && needs.prepare.outputs.tag && needs.prepare.outputs.dry_run != 'true' && needs.prepare.outputs.is_tag == 'true' && needs.check-nuget.outputs.exists != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Download NuGet artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: csharp-nuget
          path: dist

      - name: Publish to NuGet
        uses: kreuzberg-dev/actions/publish-nuget@f43a03ba22ebb2cab85676d36968ac0f96c34215 # v1.0.0
        with:
          packages-dir: dist
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

  publish-packagist:
    name: Publish to Packagist
    runs-on: ubuntu-latest
    needs: [prepare, php-pie, check-packagist]
    if: |
      needs.prepare.result == 'success' &&
      needs.prepare.outputs.is_tag == 'true' &&
      needs.prepare.outputs.dry_run != 'true' &&
      needs.check-packagist.outputs.exists != 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Trigger Packagist Update
        uses: kreuzberg-dev/actions/publish-packagist@f43a03ba22ebb2cab85676d36968ac0f96c34215 # v1.0.0
        with:
          packagist-username: kreuzberg-dev
          package-name: kreuzberg/html-to-markdown
          version: ${{ needs.prepare.outputs.version }}
          repository-url: https://github.com/kreuzberg-dev/html-to-markdown
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          PACKAGIST_API_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}

  java-ffi:
    name: Build Java native FFI libraries
    needs: [prepare, check-maven]
    if: ${{ needs.prepare.outputs.dry_run != 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.check-maven.outputs.exists != 'true' || needs.prepare.outputs.force_republish_java == 'true') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
          - os: windows-latest
            platform: windows-x86_64
          - os: macos-latest
            platform: osx-aarch64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0

      - name: Ensure target commit
        if: ${{ needs.prepare.outputs.target_sha != '' }}
        env:
          TARGET_SHA: ${{ needs.prepare.outputs.target_sha }}
        run: scripts/publish/common/ensure-target-commit.sh
        shell: bash

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@f43a03ba22ebb2cab85676d36968ac0f96c34215 # v1.0.0

      - name: Build FFI library
        env:
          PLATFORM: ${{ matrix.platform }}
        run: scripts/publish/java/build-ffi.sh "${PLATFORM}" dist/java-ffi
        shell: bash

      - name: Upload FFI artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: java-ffi-${{ matrix.platform }}
          path: dist/java-ffi
          retention-days: 14

  publish-maven:
    name: Publish Maven package
    needs: [prepare, check-maven, java-ffi]
    if: ${{ needs.prepare.result == 'success' && needs.prepare.outputs.tag && needs.prepare.outputs.dry_run != 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.check-maven.outputs.exists != 'true' || needs.prepare.outputs.force_republish_java == 'true') }}
    runs-on: ubuntu-latest
    env:
      MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
      MAVEN_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Download Java FFI artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: java-ffi-*
          path: java-ffi-artifacts
          merge-multiple: true

      - name: Verify Central credentials
        shell: bash
        run: |
          : "${MAVEN_USERNAME:?Set MAVEN_USERNAME to your Sonatype Central token user (namecode)}"
          : "${MAVEN_PASSWORD:?Set MAVEN_PASSWORD to your Sonatype Central token password}"

      - name: Install Maven (latest)
        shell: bash
        run: bash scripts/common/install-maven-latest.sh

      - name: Patch legacy Maven GPG arguments
        run: scripts/publish/maven/patch-legacy-gpg-args.sh
        shell: bash

      - name: Setup Java
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
          server-id: ossrh
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Configure GPG for non-interactive signing
        shell: bash
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent || true

          echo "::group::GPG debug info"
          gpg --version
          gpg --list-secret-keys
          echo "Available pinentry programs:"
          ls -la /usr/bin/pinentry* 2>/dev/null || echo "No pinentry in /usr/bin"
          which pinentry 2>/dev/null || echo "pinentry not on PATH"
          echo "Passphrase env var set: $([ -n "$MAVEN_GPG_PASSPHRASE" ] && echo 'YES' || echo 'NO')"
          echo "gpg-agent.conf:"
          cat ~/.gnupg/gpg-agent.conf
          echo "gpg.conf (if exists):"
          cat ~/.gnupg/gpg.conf 2>/dev/null || echo "(none)"
          echo "::endgroup::"

          echo "Testing GPG sign with loopback..."
          echo "test" > /tmp/gpg-test.txt
          echo "$MAVEN_GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 --armor --detach-sign /tmp/gpg-test.txt
          echo "GPG test sign succeeded!"
          rm -f /tmp/gpg-test.txt /tmp/gpg-test.txt.asc

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@f43a03ba22ebb2cab85676d36968ac0f96c34215 # v1.0.0

      - name: Prefer gpg2 binary
        run: scripts/publish/maven/prefer-gpg2.sh
        shell: bash

      - name: Copy native libraries into resources
        shell: bash
        run: |
          if [[ -d "java-ffi-artifacts" ]]; then
            echo "Copying native libraries from java-ffi-artifacts..."
            scripts/publish/java/copy-native-libs.sh java-ffi-artifacts
          else
            echo "Warning: java-ffi-artifacts directory not found"
          fi

      - name: Release Maven package
        uses: kreuzberg-dev/actions/publish-maven@f43a03ba22ebb2cab85676d36968ac0f96c34215 # v1.0.0
        with:
          pom-file: packages/java/pom.xml
          maven-profile: publish
          extra-args: -DskipTests
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

  publish-node:
    name: Publish Node packages
    needs: [prepare, upload-release-artifacts, check-npm]
    if: ${{ needs.prepare.result == 'success' && needs.prepare.outputs.tag && needs.prepare.outputs.dry_run != 'true' && needs.prepare.outputs.is_tag == 'true' && needs.check-npm.outputs.node_exists != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Download Node artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: node-bindings-*
          path: node-artifacts
          merge-multiple: true

      - name: Download TypeScript definitions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: node-typescript-defs
          path: typescript-defs

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Update NPM
        run: npm install -g npm@latest
        shell: bash

      - name: Enable corepack
        run: scripts/common/enable-corepack.sh
        shell: bash

      - name: Prepare artifact directory
        run: scripts/publish/node/prepare-artifact-directory.sh
        shell: bash

      - name: Install workspace dependencies
        if: ${{ needs.prepare.outputs.dry_run != 'true' }}
        run: scripts/publish/node/install-node-deps.sh
        shell: bash

      - name: Pack platform packages
        run: scripts/publish/node/pack-platform-packages.sh
        shell: bash

      - name: Publish native binary packages
        if: ${{ needs.prepare.outputs.dry_run != 'true' }}
        uses: kreuzberg-dev/actions/publish-npm@f43a03ba22ebb2cab85676d36968ac0f96c34215 # v1.0.0
        with:
          packages-dir: crates/html-to-markdown-node/npm
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Wait for npm indexing (x64)
        if: ${{ needs.prepare.outputs.dry_run != 'true' }}
        uses: kreuzberg-dev/actions/wait-for-package@f43a03ba22ebb2cab85676d36968ac0f96c34215 # v1.0.0
        with:
          registry: npm
          package: "@kreuzberg/html-to-markdown-node-linux-x64-gnu"
          version: ${{ needs.prepare.outputs.version }}
          max-attempts: "25"

      - name: Wait for npm indexing (arm64)
        if: ${{ needs.prepare.outputs.dry_run != 'true' }}
        uses: kreuzberg-dev/actions/wait-for-package@f43a03ba22ebb2cab85676d36968ac0f96c34215 # v1.0.0
        with:
          registry: npm
          package: "@kreuzberg/html-to-markdown-node-linux-arm64-gnu"
          version: ${{ needs.prepare.outputs.version }}
          max-attempts: "25"

      - name: Publish main Node package
        if: ${{ needs.prepare.outputs.dry_run != 'true' }}
        uses: kreuzberg-dev/actions/publish-npm@f43a03ba22ebb2cab85676d36968ac0f96c34215 # v1.0.0
        with:
          package-dir: crates/html-to-markdown-node
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Wait for main Node package indexing
        if: ${{ needs.prepare.outputs.dry_run != 'true' && needs.check-npm.outputs.ts_exists != 'true' }}
        uses: kreuzberg-dev/actions/wait-for-package@f43a03ba22ebb2cab85676d36968ac0f96c34215 # v1.0.0
        with:
          registry: npm
          package: "@kreuzberg/html-to-markdown-node"
          version: ${{ needs.prepare.outputs.version }}
          max-attempts: "25"

      - name: Install TypeScript wrapper dependencies from npm
        if: ${{ needs.prepare.outputs.dry_run != 'true' && needs.check-npm.outputs.ts_exists != 'true' }}
        working-directory: packages/typescript
        run: pnpm install --no-frozen-lockfile
        shell: bash

      - name: Build TypeScript wrapper package
        if: ${{ needs.prepare.outputs.dry_run != 'true' && needs.check-npm.outputs.ts_exists != 'true' }}
        run: scripts/publish/typescript/build-package.sh
        shell: bash

      - name: Publish TypeScript wrapper package
        if: ${{ needs.prepare.outputs.dry_run != 'true' && needs.check-npm.outputs.ts_exists != 'true' }}
        uses: kreuzberg-dev/actions/publish-npm@f43a03ba22ebb2cab85676d36968ac0f96c34215 # v1.0.0
        with:
          package-dir: packages/typescript
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-wasm:
    name: Publish WASM package
    needs: [prepare, upload-release-artifacts, check-npm]
    if: ${{ needs.prepare.result == 'success' && needs.prepare.outputs.tag && needs.prepare.outputs.dry_run != 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.check-npm.outputs.wasm_exists != 'true' || needs.prepare.outputs.force_republish_wasm == 'true') }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Download WASM artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: wasm-bundles
          path: wasm-artifacts

      - name: Extract WASM artifacts
        run: scripts/publish/wasm/extract-artifacts.sh
        shell: bash

      - name: Remove .gitignore files from dist directories
        run: |
          rm -f crates/html-to-markdown-wasm/dist/.gitignore
          rm -f crates/html-to-markdown-wasm/dist-node/.gitignore
          rm -f crates/html-to-markdown-wasm/dist-web/.gitignore
        shell: bash

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Update NPM
        run: npm install -g npm@latest
        shell: bash

      - name: Publish WASM package
        uses: kreuzberg-dev/actions/publish-npm@f43a03ba22ebb2cab85676d36968ac0f96c34215 # v1.0.0
        with:
          package-dir: crates/html-to-markdown-wasm
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  homebrew-bottles:
    name: Build Homebrew bottles (${{ matrix.bottle_tag }})
    needs: [prepare, check-homebrew]
    if: |
      needs.prepare.outputs.is_tag == 'true' &&
      (needs.check-homebrew.outputs.exists != 'true')
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            bottle_tag: arm64_sequoia
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0

      - name: Ensure target commit
        if: ${{ needs.prepare.outputs.target_sha != '' }}
        run: git checkout --progress --force ${{ needs.prepare.outputs.target_sha }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Homebrew
        run: |
          brew tap homebrew/core
          brew update

      - name: Extract version
        id: version
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build CLI for bottle
        run: |
          cargo build --release \
            -p html-to-markdown-cli

      - name: Create Homebrew bottle
        id: bottle
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          # Homebrew bottles require {formula}/{version}/ prefix in the tarball
          bottle_root="/tmp/html-to-markdown-bottle"
          bottle_dir="${bottle_root}/html-to-markdown/${VERSION}"
          mkdir -p "${bottle_dir}/bin"

          # Copy the built binary
          cp target/release/html-to-markdown "${bottle_dir}/bin/"

          # Create bottle tarball with correct prefix
          cd "${bottle_root}"
          bottle_filename="html-to-markdown-${VERSION}.${{ matrix.bottle_tag }}.bottle.tar.gz"
          tar -czf "${bottle_filename}" html-to-markdown/

          # Calculate SHA256
          sha256=$(shasum -a 256 "${bottle_filename}" | cut -d' ' -f1)
          echo "sha256=${sha256}" >> "$GITHUB_OUTPUT"
          echo "filename=${bottle_filename}" >> "$GITHUB_OUTPUT"

          # Copy to workspace for artifact upload
          cp "${bottle_filename}" "${{ github.workspace }}/"
          echo "Bottle created: ${bottle_filename}"
          echo "SHA256: ${sha256}"

      - name: Verify bottle file in workspace
        run: |
          cd "${{ github.workspace }}"
          ls -lh html-to-markdown-*.bottle.tar.gz
          echo "Files in workspace:"
          ls -la
        shell: bash

      - name: Upload bottle artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: homebrew-bottle-${{ matrix.bottle_tag }}
          path: html-to-markdown-${{ steps.version.outputs.version }}.${{ matrix.bottle_tag }}.bottle.tar.gz
          retention-days: 14
          if-no-files-found: error

  upload-homebrew-bottles:
    name: Upload Homebrew bottles to GitHub Release
    needs: [prepare, check-homebrew, homebrew-bottles]
    if: |
      always() &&
      needs.prepare.outputs.dry_run != 'true' &&
      needs.prepare.outputs.is_tag == 'true' &&
      (needs.check-homebrew.outputs.exists != 'true') &&
      needs.homebrew-bottles.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: scripts/publish/ensure-github-release-exists.sh "${{ needs.prepare.outputs.tag }}"

      - name: Download bottle artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: homebrew-bottle-*
          path: dist/homebrew
          merge-multiple: true

      - name: Verify downloaded artifacts
        run: |
          echo "Contents of dist/homebrew:"
          ls -laR dist/homebrew || echo "dist/homebrew not found"
          echo "All dist contents:"
          ls -laR dist || echo "dist not found"
        shell: bash

      - name: Upload bottles (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: scripts/publish/upload-homebrew-bottles.sh "${{ needs.prepare.outputs.tag }}" dist/homebrew

  publish-homebrew:
    name: Update Homebrew formula
    needs: [prepare, check-homebrew, upload-homebrew-bottles]
    if: |
      always() &&
      needs.prepare.outputs.dry_run != 'true' &&
      needs.prepare.outputs.is_tag == 'true' &&
      (needs.check-homebrew.outputs.exists != 'true') &&
      needs.upload-homebrew-bottles.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Download bottle artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: homebrew-bottle-*
          path: dist/homebrew
          merge-multiple: true

      - name: Setup Git credentials
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TOKEN }}
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${GH_TOKEN}@github.com" > ~/.git-credentials
          git config --global user.name "html-to-markdown-bot"
          git config --global user.email "bot@kreuzberg.dev"

      - name: Update Homebrew formula with bottles
        uses: kreuzberg-dev/actions/publish-homebrew@f43a03ba22ebb2cab85676d36968ac0f96c34215 # v1.0.0
        with:
          bottles-dir: dist/homebrew
          formula-name: html-to-markdown
          tap-repo: kreuzberg-dev/homebrew-tap
          tag: ${{ needs.prepare.outputs.tag }}
          version: ${{ needs.prepare.outputs.version }}
          github-repo: kreuzberg-dev/html-to-markdown
          dry-run: ${{ needs.prepare.outputs.dry_run }}
