name: CI Ruby

on:
  push:
    branches: [main]
    paths:
      - packages/ruby/**
      - packages/ruby/ext/**/*
      - scripts/publish/ruby/**
      - crates/html-to-markdown/**
      - Gemfile
      - Gemfile.lock
      - .task/**
      - Taskfile.yaml
      - .github/workflows/ci-ruby.yaml
  pull_request:
    branches: [main]
    paths:
      - packages/ruby/**
      - packages/ruby/ext/**/*
      - scripts/publish/ruby/**
      - crates/html-to-markdown/**
      - Gemfile
      - Gemfile.lock
      - .task/**
      - Taskfile.yaml
      - .github/workflows/ci-ruby.yaml

permissions:
  contents: read

concurrency:
  group: ci-ruby-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ruby-bindings:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        ruby: ["3.2", "3.3"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6 # v6

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1 # v1

      - name: Setup Ruby (Unix)
        if: runner.os != 'Windows'
        uses: ruby/setup-ruby@v1 # v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: "2.7.2"
          bundler-cache: false
          working-directory: packages/ruby

      - name: Setup Ruby (Windows)
        if: runner.os == 'Windows'
        uses: ruby/setup-ruby@v1 # v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: "2.7.2"
          bundler-cache: false
          working-directory: packages/ruby
          windows-toolchain: UCRT64

      - name: Set up Python
        uses: actions/setup-python@v6 # v6
        with:
          python-version: "3.12"

      - name: Vendor core crate
        run: python3 scripts/ci/ruby/vendor-core-crate.py
        shell: bash

      - name: Build CLI binary
        uses: kreuzberg-dev/actions/build-rust-cli@v1 # v1
        with:
          package-name: html-to-markdown-cli
          binary-name: html-to-markdown

      - name: Build Ruby extension
        uses: kreuzberg-dev/actions/build-ruby-gem@v1 # v1

      - name: Run Rubocop (Unix)
        if: runner.os != 'Windows' && matrix.os == 'ubuntu-latest' && matrix.ruby == '3.3'
        run: ./scripts/ci/ruby/run-rubocop.sh
        shell: bash

      - name: Validate RBS signatures (Unix)
        if: runner.os != 'Windows' && matrix.os == 'ubuntu-latest' && matrix.ruby == '3.3'
        run: ./scripts/ci/ruby/run-rbs-validate.sh
        shell: bash

      - name: Run Steep type checking (Unix)
        if: runner.os != 'Windows' && matrix.os == 'ubuntu-latest' && matrix.ruby == '3.3'
        working-directory: packages/ruby
        run: ../../scripts/ci/ruby/run-steep.sh
        shell: bash

      - name: Run Ruby specs (Unix)
        if: runner.os != 'Windows'
        working-directory: packages/ruby
        run: ../../scripts/ci/ruby/run-rspec-unix.sh
        shell: bash

      - name: Run Ruby specs (Windows)
        if: runner.os == 'Windows'
        working-directory: packages/ruby
        shell: pwsh
        run: ../../scripts/ci/ruby/run-rspec-windows.ps1

      - name: Install Task
        if: runner.os != 'Windows'
        uses: go-task/setup-task@v2 # v2
        with:
          version: 3.46.4

      - name: Run E2E tests
        if: runner.os != 'Windows'
        run: task ruby:e2e:test
        shell: bash
