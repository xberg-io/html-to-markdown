name: CI Ruby

on:
  push:
    branches: [main]
    paths:
      - packages/ruby/**
      - packages/ruby/ext/**/*
      - scripts/publish/ruby/**
      - crates/html-to-markdown-rb/**
      - crates/html-to-markdown/**
      - Gemfile
      - Gemfile.lock
      - .task/**
      - Taskfile.yaml
      - .github/workflows/ci-ruby.yaml
  pull_request:
    branches: [main]
    paths:
      - packages/ruby/**
      - packages/ruby/ext/**/*
      - scripts/publish/ruby/**
      - crates/html-to-markdown-rb/**
      - crates/html-to-markdown/**
      - Gemfile
      - Gemfile.lock
      - .task/**
      - Taskfile.yaml
      - .github/workflows/ci-ruby.yaml

permissions:
  contents: read

concurrency:
  group: ci-ruby-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ruby-bindings:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        ruby: ["3.2", "3.3"]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@c964c3c295858254aa86d78cf36bd66bd9364e9a # v1.0.0

      - name: Setup Ruby (Unix)
        if: runner.os != 'Windows'
        uses: ruby/setup-ruby@4eb9f110bac952a8b68ecf92e3b5c7a987594ba6 # v1.292.0
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: "2.7.2"
          bundler-cache: false
          working-directory: packages/ruby

      - name: Setup Ruby (Windows)
        if: runner.os == 'Windows'
        uses: ruby/setup-ruby@4eb9f110bac952a8b68ecf92e3b5c7a987594ba6 # v1.292.0
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: "2.7.2"
          bundler-cache: false
          working-directory: packages/ruby
          windows-toolchain: UCRT64

      - name: Build CLI binary
        uses: kreuzberg-dev/actions/build-rust-cli@c964c3c295858254aa86d78cf36bd66bd9364e9a # v1.0.0
        with:
          package-name: html-to-markdown-cli
          binary-name: html-to-markdown

      - name: Build Ruby extension
        uses: kreuzberg-dev/actions/build-ruby-gem@c964c3c295858254aa86d78cf36bd66bd9364e9a # v1.0.0

      - name: Run Rubocop (Unix)
        if: runner.os != 'Windows' && matrix.os == 'ubuntu-latest' && matrix.ruby == '3.3'
        run: ./scripts/ci/ruby/run-rubocop.sh
        shell: bash

      - name: Validate RBS signatures (Unix)
        if: runner.os != 'Windows' && matrix.os == 'ubuntu-latest' && matrix.ruby == '3.3'
        run: ./scripts/ci/ruby/run-rbs-validate.sh
        shell: bash

      - name: Run Steep type checking (Unix)
        if: runner.os != 'Windows' && matrix.os == 'ubuntu-latest' && matrix.ruby == '3.3'
        working-directory: packages/ruby
        run: ../../scripts/ci/ruby/run-steep.sh
        shell: bash

      - name: Run Ruby specs (Unix)
        if: runner.os != 'Windows'
        working-directory: packages/ruby
        run: ../../scripts/ci/ruby/run-rspec-unix.sh
        shell: bash

      - name: Run Ruby specs (Windows)
        if: runner.os == 'Windows'
        working-directory: packages/ruby
        shell: pwsh
        run: ../../scripts/ci/ruby/run-rspec-windows.ps1
