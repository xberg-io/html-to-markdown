      - name: Install Task
        uses: kreuzberg-dev/actions/install-task@v1 # v1

      - name: Install alef
        if: matrix.os == 'ubuntu-latest'
        uses: kreuzberg-dev/actions/install-alef@v1 # v1

      - name: Run E2E tests (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: alef test --e2e --lang java
        shell: bash

