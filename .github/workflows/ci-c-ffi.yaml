name: CI C FFI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - crates/html-to-markdown-ffi/**
      - crates/html-to-markdown/**
      - Cargo.toml
      - Cargo.lock
      - .github/workflows/ci-c-ffi.yaml
  pull_request:
    branches: [main]
    paths:
      - crates/html-to-markdown-ffi/**
      - crates/html-to-markdown/**
      - Cargo.toml
      - Cargo.lock
      - .github/workflows/ci-c-ffi.yaml

permissions:
  contents: read

concurrency:
  group: ci-c-ffi-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  c-ffi-tests:
    name: C FFI Tests (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@c964c3c295858254aa86d78cf36bd66bd9364e9a # v1.0.0
        with:
          cache-key-prefix: c-ffi
          use-sccache: false

      - name: Build html-to-markdown-ffi
        shell: bash
        run: cargo build -p html-to-markdown-ffi

      - name: Compile C tests
        shell: bash
        run: make -C crates/html-to-markdown-ffi/tests/c LIBDIR="$(pwd)/target/debug" clean all

      - name: Run C tests
        shell: bash
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/target/debug
          DYLD_LIBRARY_PATH: ${{ github.workspace }}/target/debug
        run: |
          FAILED=0
          for test in crates/html-to-markdown-ffi/tests/c/test_*; do
            [ -x "$test" ] || continue
            name=$(basename "$test")
            if "$test"; then
              echo "PASS: $name"
            else
              echo "FAIL: $name"
              FAILED=1
            fi
          done
          [ "$FAILED" -eq 0 ] || exit 1

      - name: Verify pkg-config output
        shell: bash
        run: |
          PC_DIR="$(pwd)/target/debug/build"
          PC_FILE=$(find "$PC_DIR" -name 'html-to-markdown.pc' -path '*/html-to-markdown-ffi-*/out/*' 2>/dev/null | head -1)
          if [ -z "$PC_FILE" ]; then
            echo "Warning: html-to-markdown.pc not found in build output"
            find "$PC_DIR" -name '*.pc' 2>/dev/null || echo "No .pc files found"
          else
            echo "Found pkg-config file: $PC_FILE"
            cat "$PC_FILE"
          fi

      - name: Verify header version constants
        shell: bash
        run: |
          HEADER="crates/html-to-markdown-ffi/html_to_markdown.h"
          echo "Checking version constants in $HEADER..."
          grep 'HTML_TO_MARKDOWN_VERSION_MAJOR' "$HEADER"
          grep 'HTML_TO_MARKDOWN_VERSION_MINOR' "$HEADER"
          grep 'HTML_TO_MARKDOWN_VERSION_PATCH' "$HEADER"
          grep 'HTML_TO_MARKDOWN_VERSION ' "$HEADER"
          echo "Version constants verified."

      - name: Verify CMake config files exist
        shell: bash
        run: |
          test -f crates/html-to-markdown-ffi/cmake/html-to-markdown-ffi-config.cmake
          test -f crates/html-to-markdown-ffi/cmake/html-to-markdown-ffi-config-version.cmake
          echo "CMake config files verified."

  c-ffi-tests-windows:
    name: C FFI Tests (windows-latest)
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@c964c3c295858254aa86d78cf36bd66bd9364e9a # v1.0.0
        with:
          cache-key-prefix: c-ffi-windows
          use-sccache: false

      - name: Build html-to-markdown-ffi
        shell: bash
        run: cargo build -p html-to-markdown-ffi

      - name: Verify header generated
        shell: bash
        run: |
          test -f crates/html-to-markdown-ffi/html_to_markdown.h
          grep 'HTML_TO_MARKDOWN_VERSION_MAJOR' crates/html-to-markdown-ffi/html_to_markdown.h
          echo "Header verified on Windows."
