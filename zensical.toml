[project]
site_name = "html-to-markdown"
site_description = "High-performance HTML to Markdown conversion powered by Rust"
site_url = "https://docs.html-to-markdown.kreuzberg.dev"
site_author = "kreuzberg.dev"
repo_name = "kreuzberg-dev/html-to-markdown"
repo_url = "https://github.com/kreuzberg-dev/html-to-markdown"
edit_uri = "edit/main/docs/"
copyright = "Copyright &copy; 2023-2026 Kreuzberg.dev"

extra_css = ["css/extra.css"]

nav = [
  { "Home" = "index.md" },
  { "Get Started" = [
    { "Installation" = "installation.md" },
    { "Usage" = "usage.md" },
    { "CLI" = "cli.md" },
  ] },
  { "Guides" = [
    { "Visitor pattern" = "visitor.md" },
    { "Table extraction" = "tables.md" },
    { "Error handling" = "errors.md" },
  ] },
  { "Concepts" = [
    { "Architecture" = "concepts/architecture.md" },
    { "Conversion pipeline" = "concepts/pipeline.md" },
    { "Plugin system" = "concepts/plugin-system.md" },
  ] },
  { "Reference" = [
    { "Configuration" = "configuration.md" },
    { "API reference" = "api-reference.md" },
    { "Language guides" = "language-guides.md" },
    { "Language APIs" = [
      { "Rust" = "reference/api-rust.md" },
      { "Python" = "reference/api-python.md" },
      { "TypeScript" = "reference/api-typescript.md" },
      { "Go" = "reference/api-go.md" },
      { "Ruby" = "reference/api-ruby.md" },
      { "PHP" = "reference/api-php.md" },
      { "Java" = "reference/api-java.md" },
      { "C#" = "reference/api-csharp.md" },
      { "Elixir" = "reference/api-elixir.md" },
      { "R" = "reference/api-r.md" },
      { "C" = "reference/api-c.md" },
      { "WebAssembly" = "reference/api-wasm.md" },
    ] },
    { "Types" = "reference/types.md" },
    { "Configuration (generated)" = "reference/configuration.md" },
    { "Error types (generated)" = "reference/errors.md" },
  ] },
  { "More" = [
    { "Migration" = "migration.md" },
    { "Contributing" = "contributing.md" },
    { "Changelog" = "https://github.com/kreuzberg-dev/html-to-markdown/blob/main/CHANGELOG.md" },
  ] },

  { "Ecosystem" = "ecosystem.md" },
]

[project.theme]
name = "material"
custom_dir = "docs/overrides"
logo = "assets/logo.svg"
favicon = "assets/favicon.ico"
language = "en"
features = [
  "content.code.copy",
  "content.code.annotate",
  "content.tabs.link",
  "navigation.instant",
  "navigation.instant.progress",
  "navigation.path",
  "navigation.prune",
  "navigation.indexes",
  "navigation.sections",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.tracking",
  "navigation.top",
  "search.highlight",
  "search.share",
  "search.suggest",
  "toc.follow",
  "toc.integrate",
  "announce.dismiss",
]

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

[project.theme.icon]
repo = "github"
search = "search"

# First palette is the default (dark). Second is light; users can toggle via header.
[[project.theme.palette]]
scheme = "slate"
primary = "custom"
accent = "custom"

[project.theme.palette.toggle]
icon = "sun"
name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
primary = "custom"
accent = "custom"

[project.theme.palette.toggle]
icon = "moon"
name = "Switch to dark mode"

# --- Markdown Extensions ---

[project.markdown_extensions.admonition]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.def_list]

[project.markdown_extensions.footnotes]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = true
toc_depth = 3

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"
options = { custom_icons = ["docs/overrides/.icons"] }

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
linenums = false
use_pygments = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.keys]

[project.markdown_extensions.pymdownx.mark]

[project.markdown_extensions.pymdownx.smartsymbols]

[project.markdown_extensions.pymdownx.snippets]
base_path = [".", "docs"]
check_paths = true

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true

[project.markdown_extensions.pymdownx.tabbed.slugify]
case = "lower"

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

# --- Plugins ---

[project.plugins.search]

# --- Extra ---

[project.extra]

[project.extra.status]
new = "Recently added"
deprecated = "Deprecated"

[project.extra.repo]
stars = true
forks = true

